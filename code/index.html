<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ForHome</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #fff;
      --line: #dbe3ef;
      --text: #172033;
      --muted: #687386;
      --blue: #2563eb;
      --blue-soft: #e9f0ff;
      --teal: #0f9f8f;
      --teal-soft: #e5f7f3;
      --amber: #f59e0b;
      --amber-soft: #fff3d7;
      --red: #ef4444;
      --red-soft: #ffe8e8;
      --shadow: 0 8px 24px rgba(23, 32, 51, .08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", "Malgun Gothic", system-ui, sans-serif;
      letter-spacing: 0;
    }
    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }
    button:disabled { cursor: not-allowed; opacity: .45; }
    [hidden] { display: none !important; }
    .login-screen {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        linear-gradient(120deg, rgba(37, 99, 235, .12), transparent 38%),
        linear-gradient(260deg, rgba(15, 159, 143, .16), transparent 42%),
        var(--bg);
    }
    .login-box, .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 2px 10px rgba(23, 32, 51, .04);
    }
    .login-box {
      width: min(100%, 380px);
      padding: 24px;
      box-shadow: var(--shadow);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .brand-mark {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: var(--blue-soft);
      color: var(--blue);
      font-weight: 900;
      font-size: 22px;
      flex: 0 0 auto;
    }
    .brand h1 { margin: 0; font-size: 22px; line-height: 1.2; }
    .brand p { margin: 4px 0 0; color: var(--muted); font-size: 13px; }
    .field { display: grid; gap: 6px; margin-bottom: 12px; }
    .field label { color: var(--muted); font-size: 12px; font-weight: 700; }
    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      padding: 10px 12px;
      outline: none;
    }
    textarea { min-height: 86px; resize: vertical; }
    input:focus, select:focus, textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, .12);
    }
    .error { min-height: 18px; color: var(--red); font-size: 12px; margin: 4px 0 10px; }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(255, 255, 255, .94);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(12px);
    }
    .topbar-inner {
      max-width: 1120px;
      margin: 0 auto;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .app-title {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }
    .app-title strong { display: block; font-size: 17px; white-space: nowrap; }
    .status-line {
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 52vw;
    }
    .user-area { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .user-pill {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 999px;
      padding: 7px 10px;
      color: var(--text);
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 6px;
      max-width: 170px;
    }
    .layout {
      max-width: 1120px;
      margin: 0 auto;
      padding: 16px;
      display: grid;
      grid-template-columns: 176px minmax(0, 1fr);
      gap: 16px;
    }
    .tabbar {
      display: grid;
      gap: 8px;
      align-self: start;
      position: sticky;
      top: 74px;
    }
    .tab-btn {
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 0 12px;
      font-weight: 700;
    }
    .tab-btn.active {
      border-color: var(--blue);
      background: var(--blue-soft);
      color: var(--blue);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      gap: 12px;
    }
    .panel { padding: 14px; }
    .span-4 { grid-column: span 4; }
    .span-5 { grid-column: span 5; }
    .span-6 { grid-column: span 6; }
    .span-7 { grid-column: span 7; }
    .span-8 { grid-column: span 8; }
    .span-12 { grid-column: span 12; }
    .section { display: none; }
    .section.active { display: block; }
    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }
    .panel-title { font-size: 15px; font-weight: 800; }
    .mini { color: var(--muted); font-size: 12px; }
    .metric-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .metric {
      min-height: 76px;
      border-radius: 8px;
      padding: 10px;
      background: #f8fafc;
      border: 1px solid #edf2f7;
    }
    .metric strong { display: block; margin-top: 5px; font-size: 22px; }
    .metric span { color: var(--muted); font-size: 12px; }
    .list { display: grid; gap: 8px; }
    .member-row, .activity-row, .message-row, .rank-row, .badge-item, .chore-row, .account-row {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 10px;
    }
    .member-row, .rank-row, .activity-row, .account-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      font-weight: 900;
      flex: 0 0 auto;
      background: #f1f5f9;
    }
    .grow { min-width: 0; flex: 1; }
    .name-line {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }
    .name-line strong, .ellipsis {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .progress { height: 8px; border-radius: 999px; overflow: hidden; background: #e8edf5; }
    .progress > span { display: block; height: 100%; border-radius: 999px; background: var(--teal); }
    .tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 22px;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 11px;
      font-weight: 800;
      color: var(--muted);
      background: #f1f5f9;
      white-space: nowrap;
    }
    .tag.blue { color: var(--blue); background: var(--blue-soft); }
    .tag.teal { color: var(--teal); background: var(--teal-soft); }
    .tag.amber { color: #a16207; background: var(--amber-soft); }
    .tag.red { color: var(--red); background: var(--red-soft); }
    .btn {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      padding: 8px 12px;
      font-weight: 800;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }
    .btn.primary { border-color: var(--blue); background: var(--blue); color: #fff; }
    .btn.danger { border-color: #fecaca; background: var(--red-soft); color: var(--red); }
    .btn.icon { width: 38px; padding: 0; flex: 0 0 auto; }
    .btn.full { width: 100%; }
    .segmented { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; }
    .chip {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--muted);
      min-height: 34px;
      padding: 6px 12px;
      font-weight: 800;
      white-space: nowrap;
    }
    .chip.active { background: var(--blue-soft); color: var(--blue); border-color: var(--blue); }
    .selector-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 8px; }
    .select-card {
      min-height: 64px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      text-align: left;
    }
    .select-card.active { border-color: var(--blue); background: var(--blue-soft); }
    .select-card.disabled { opacity: .42; }
    .chore-row {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      text-align: left;
    }
    .chore-row.active { border-color: var(--blue); background: var(--blue-soft); }
    .calendar-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 12px; }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 6px; }
    .weekday { color: var(--muted); font-size: 12px; text-align: center; font-weight: 800; padding: 4px 0; }
    .day { min-height: 82px; border: 1px solid var(--line); border-radius: 8px; background: #fff; padding: 7px; text-align: left; }
    .day.today { border-color: var(--teal); background: var(--teal-soft); }
    .day.active { border-color: var(--blue); box-shadow: 0 0 0 2px rgba(37, 99, 235, .12); }
    .day.out { opacity: .42; }
    .dot-row { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 8px; }
    .dot { width: 7px; height: 7px; border-radius: 999px; background: var(--amber); }
    .badge-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(145px, 1fr)); gap: 8px; }
    .badge-item { min-height: 112px; display: grid; gap: 6px; align-content: start; }
    .badge-item.locked { opacity: .42; }
    .badge-emoji { font-size: 24px; font-weight: 900; }
    .form-grid { display: grid; grid-template-columns: repeat(12, minmax(0, 1fr)); gap: 8px; align-items: end; }
    .col-2 { grid-column: span 2; }
    .col-3 { grid-column: span 3; }
    .col-4 { grid-column: span 4; }
    .col-5 { grid-column: span 5; }
    .col-6 { grid-column: span 6; }
    .col-12 { grid-column: span 12; }
    .empty {
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 18px;
      color: var(--muted);
      text-align: center;
      background: #fbfdff;
    }
    .toast {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      min-width: min(420px, calc(100vw - 32px));
      background: #172033;
      color: #fff;
      border-radius: 8px;
      padding: 12px 14px;
      box-shadow: var(--shadow);
      z-index: 40;
      display: none;
    }
    .toast.show { display: block; }
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 35;
      background: rgba(23, 32, 51, .44);
      display: grid;
      place-items: center;
      padding: 16px;
    }
    .dialog {
      width: min(100%, 360px);
      background: #fff;
      border-radius: 8px;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      padding: 18px;
      text-align: center;
    }
    .dialog-emoji { font-size: 34px; font-weight: 900; margin-bottom: 8px; }
    .dialog h2 { margin: 0 0 8px; font-size: 20px; }
    .dialog p { margin: 0 0 14px; color: var(--muted); line-height: 1.55; }
    @media (max-width: 820px) {
      .topbar-inner { padding: 10px 12px; }
      .status-line { max-width: 42vw; }
      .layout { grid-template-columns: 1fr; padding: 12px; padding-bottom: 86px; }
      .tabbar {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        top: auto;
        z-index: 25;
        grid-template-columns: repeat(5, 1fr);
        gap: 0;
        padding: 6px 6px 8px;
        background: rgba(255, 255, 255, .96);
        border-top: 1px solid var(--line);
        backdrop-filter: blur(12px);
      }
      .tab-btn { height: 50px; border-color: transparent; background: transparent; display: grid; place-items: center; gap: 2px; padding: 4px; font-size: 11px; }
      .grid { gap: 10px; }
      .span-4, .span-5, .span-6, .span-7, .span-8, .span-12 { grid-column: span 12; }
      .metric-row { grid-template-columns: 1fr 1fr; }
      .day { min-height: 58px; padding: 5px; }
      .user-pill { max-width: 110px; }
      .form-grid { grid-template-columns: 1fr; }
      .col-2, .col-3, .col-4, .col-5, .col-6, .col-12 { grid-column: 1; }
    }
  </style>
</head>
<body>
  <section class="login-screen" id="loginScreen">
    <div class="login-box">
      <div class="brand">
        <div class="brand-mark">FH</div>
        <div>
          <h1>ForHome</h1>
          <p id="loginServerText">Checking PostgreSQL server</p>
        </div>
      </div>
      <div class="field">
        <label for="loginId">Account</label>
        <input id="loginId" data-testid="login-id" autocomplete="username" value="admin">
      </div>
      <div class="field">
        <label for="loginPw">Password</label>
        <input id="loginPw" data-testid="login-password" type="password" autocomplete="current-password" value="admin1234">
      </div>
      <div class="error" id="loginError"></div>
      <button class="btn primary full" data-testid="login-submit" id="loginButton">Log in</button>
    </div>
  </section>

  <section class="app-shell" id="appShell" hidden>
    <header class="topbar">
      <div class="topbar-inner">
        <div class="app-title">
          <div class="brand-mark" style="width:38px;height:38px;font-size:16px;">FH</div>
          <div>
            <strong>ForHome</strong>
            <div class="status-line" id="syncStatus">Preparing sync</div>
          </div>
        </div>
        <div class="user-area">
          <button class="user-pill" id="currentUser" title="Logout"></button>
          <button class="btn icon" id="reloadButton" title="Refresh">R</button>
        </div>
      </div>
    </header>

    <div class="layout">
      <nav class="tabbar" aria-label="Main menu">
        <button class="tab-btn active" data-tab="home" data-testid="tab-home"><span>Home</span></button>
        <button class="tab-btn" data-tab="tasks" data-testid="tab-tasks"><span>Tasks</span></button>
        <button class="tab-btn" data-tab="calendar" data-testid="tab-calendar"><span>Calendar</span></button>
        <button class="tab-btn" data-tab="badges" data-testid="tab-badges"><span>Badges</span></button>
        <button class="tab-btn" data-tab="settings" data-testid="tab-settings"><span>Settings</span></button>
      </nav>

      <main class="content">
        <section class="section active" id="section-home" data-testid="section-home"></section>
        <section class="section" id="section-tasks" data-testid="section-tasks"></section>
        <section class="section" id="section-calendar" data-testid="section-calendar"></section>
        <section class="section" id="section-badges" data-testid="section-badges"></section>
        <section class="section" id="section-settings" data-testid="section-settings"></section>
      </main>
    </div>
  </section>

  <div class="overlay" id="successOverlay" hidden>
    <div class="dialog">
      <div class="dialog-emoji" id="successEmoji">OK</div>
      <h2 id="successTitle">Done</h2>
      <p id="successMessage"></p>
      <button class="btn primary full" id="closeDialog">Close</button>
    </div>
  </div>
  <div class="toast" id="toast"></div>

  <script>
    const API_MODE = location.protocol !== 'file:';
    const SESSION_KEY = 'forhome-session-v1';
    const CATEGORIES = { all: 'All', house: 'House', care: 'Care', pet: 'Pet', child: 'Child' };
    const BADGES = [
      { id: 'first', emoji: 'B1', name: 'First task', desc: 'Complete one task this week', cond: (m, h) => countFor(m, h) >= 1 },
      { id: 'five', emoji: 'B5', name: 'Steady', desc: 'Complete five tasks this week', cond: (m, h) => countFor(m, h) >= 5 },
      { id: 'ten', emoji: 'B10', name: 'Hero', desc: 'Complete ten tasks this week', cond: (m, h) => countFor(m, h) >= 10 },
      { id: 'xp100', emoji: 'XP', name: '100 XP', desc: 'Earn 100 XP this week', cond: (m, h) => xpFor(m, h) >= 100 },
      { id: 'fat20', emoji: 'FT', name: 'Heavy lift', desc: 'Reach fatigue 20 this week', cond: (m, h) => fatigueFor(m, h) >= 20 },
      { id: 'msg', emoji: 'MS', name: 'Messenger', desc: 'Send a family message', cond: (m) => state.messages.some(x => x.fromId === m.id) }
    ];
    const defaultState = () => ({
      version: 0,
      updatedAt: new Date().toISOString(),
      settings: { vacationThreshold: 25, weekStartsOn: 1 },
      members: [
        memberSeed('mom', 'Mom', 'M', true, '#ef4444'),
        memberSeed('dad', 'Dad', 'D', true, '#2563eb'),
        memberSeed('son', 'Son', 'S', false, '#f59e0b')
      ],
      accounts: [
        { id: 'mom', password: 'mom1234', memberId: 'mom', isAdmin: false },
        { id: 'dad', password: 'dad1234', memberId: 'dad', isAdmin: false },
        { id: 'son', password: 'son1234', memberId: 'son', isAdmin: false },
        { id: 'admin', password: 'admin1234', memberId: null, isAdmin: true }
      ],
      chores: [
        choreSeed('c1', 'Dishes', 'DI', 2, 'house'),
        choreSeed('c2', 'Vacuum', 'VA', 3, 'house'),
        choreSeed('c3', 'Laundry', 'LA', 2, 'house'),
        choreSeed('p1', 'Medicine', 'ME', 2, 'care'),
        choreSeed('pet1', 'Pet food', 'PF', 1, 'pet'),
        choreSeed('ch1', 'Clean room', 'CR', 1, 'child')
      ],
      history: [],
      messages: [],
      badgeHistory: []
    });
    function memberSeed(id, name, emoji, restricted, color) {
      return { id, name, emoji, restricted, color, xp: 0, totalFatigue: 0, completedTasks: 0, stickers: 0, onVacation: false, earnedBadges: [] };
    }
    function choreSeed(id, name, emoji, fatigue, category) {
      return { id, name, emoji, fatigue, xp: fatigue * 10, category };
    }

    let state = defaultState();
    let session = null;
    let activeTab = 'home';
    let selectedMemberId = null;
    let selectedChoreId = null;
    let selectedCategory = 'all';
    let badgeMemberId = null;
    let calendarMonth = new Date();
    let selectedDate = dateKey(Date.now());
    let saving = false;
    let syncTimer = null;

    const $ = (id) => document.getElementById(id);
    const money = new Intl.NumberFormat('en-US');

    document.addEventListener('DOMContentLoaded', init);
    $('loginButton').addEventListener('click', doLogin);
    $('loginPw').addEventListener('keydown', (e) => { if (e.key === 'Enter') doLogin(); });
    $('currentUser').addEventListener('click', logout);
    $('reloadButton').addEventListener('click', hardReload);
    $('closeDialog').addEventListener('click', () => $('successOverlay').hidden = true);
    document.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', () => showTab(btn.dataset.tab)));

    async function init() {
      await loadState();
      session = readJson(sessionStorage.getItem(SESSION_KEY));
      if (session && !account(session.accountId)) session = null;
      if (session) showApp(); else showLogin();
      if (syncTimer) clearInterval(syncTimer);
      syncTimer = setInterval(refreshIfChanged, 8000);
    }

    async function loadState() {
      try {
        if (!API_MODE) throw new Error('Open through the PowerShell server.');
        state = normalizeState(await api('/api/state'));
        $('loginServerText').textContent = 'PostgreSQL server connected';
        setStatus('Synced');
      } catch (err) {
        state = normalizeState(defaultState());
        $('loginServerText').textContent = 'PostgreSQL server unavailable';
        setStatus('Server connection failed');
        toast(`Server error: ${err.message}`);
      }
    }

    function normalizeState(next) {
      const base = defaultState();
      const merged = { ...base, ...(next || {}) };
      merged.settings = { ...base.settings, ...(next?.settings || {}) };
      merged.members = Array.isArray(next?.members) ? next.members.map(m => ({ ...memberSeed(m.id, m.name, m.emoji, !!m.restricted, m.color || '#2563eb'), ...m })) : base.members;
      merged.chores = Array.isArray(next?.chores) ? next.chores.map(c => ({ ...c, xp: Number(c.xp || c.fatigue * 10) })) : base.chores;
      merged.accounts = Array.isArray(next?.accounts) && next.accounts.length ? next.accounts : base.accounts;
      merged.history = Array.isArray(next?.history) ? next.history : [];
      merged.messages = Array.isArray(next?.messages) ? next.messages : [];
      merged.badgeHistory = Array.isArray(next?.badgeHistory) ? next.badgeHistory : [];
      updateVacationFlags(merged);
      return merged;
    }

    async function saveState(showSaved = true) {
      saving = true;
      state.updatedAt = new Date().toISOString();
      updateVacationFlags(state);
      try {
        if (!API_MODE) throw new Error('Server mode is required.');
        state = normalizeState(await api('/api/state', { method: 'POST', body: JSON.stringify(state) }));
        setStatus(`Synced v${state.version || 0}`);
        if (showSaved) toast('Saved');
      } catch (err) {
        setStatus('PostgreSQL save failed');
        toast(`Save failed: ${err.message}`);
      } finally {
        saving = false;
      }
      render();
    }

    async function refreshIfChanged() {
      if (!API_MODE || saving || $('appShell').hidden) return;
      const active = document.activeElement;
      if (active && ['INPUT', 'TEXTAREA', 'SELECT'].includes(active.tagName)) return;
      try {
        const remote = normalizeState(await api('/api/state'));
        if ((remote.version || 0) !== (state.version || 0)) {
          state = remote;
          setStatus(`Synced v${state.version || 0}`);
          render();
        }
      } catch {
        setStatus('Server check failed');
      }
    }

    async function hardReload() {
      await loadState();
      render();
      toast('Reloaded');
    }

    async function api(path, options = {}) {
      const res = await fetch(path, {
        ...options,
        headers: { 'Content-Type': 'application/json; charset=utf-8', ...(options.headers || {}) }
      });
      if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
      return res.json();
    }

    function doLogin() {
      const id = $('loginId').value.trim();
      const pw = $('loginPw').value;
      const acc = state.accounts.find(x => x.id === id && x.password === pw);
      if (!acc) {
        $('loginError').textContent = 'Check account and password.';
        return;
      }
      session = { accountId: acc.id, memberId: acc.memberId, isAdmin: !!acc.isAdmin };
      sessionStorage.setItem(SESSION_KEY, JSON.stringify(session));
      showApp();
    }

    function logout() {
      sessionStorage.removeItem(SESSION_KEY);
      session = null;
      showLogin();
    }
    function showLogin() { $('loginScreen').hidden = false; $('appShell').hidden = true; }
    function showApp() {
      $('loginScreen').hidden = true;
      $('appShell').hidden = false;
      const acc = account(session.accountId);
      const m = member(acc?.memberId);
      $('currentUser').innerHTML = `${escapeHtml(m?.emoji || 'AD')} <span class="ellipsis">${escapeHtml(acc?.id || 'user')}</span>`;
      if (!selectedMemberId) selectedMemberId = firstAllowedMember()?.id || state.members[0]?.id;
      if (!badgeMemberId) badgeMemberId = selectedMemberId || state.members[0]?.id;
      render();
    }

    function showTab(tab) {
      activeTab = tab;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
      document.querySelectorAll('.section').forEach(s => s.classList.toggle('active', s.id === `section-${tab}`));
      render();
    }

    function render() {
      if ($('appShell').hidden) return;
      if (activeTab === 'home') renderHome();
      if (activeTab === 'tasks') renderTasks();
      if (activeTab === 'calendar') renderCalendar();
      if (activeTab === 'badges') renderBadges();
      if (activeTab === 'settings') renderSettings();
    }

    function renderHome() {
      const weekly = weekHistory();
      const ranked = [...state.members].sort((a, b) => xpFor(b, weekly) - xpFor(a, weekly));
      const top = ranked.find(m => countFor(m, weekly));
      const totalXp = weekly.reduce((sum, x) => sum + Number(x.xpEarned || 0), 0);
      const messages = [...state.messages].sort((a, b) => b.timestamp - a.timestamp).slice(0, 8);
      const recent = [...state.history].sort((a, b) => b.timestamp - a.timestamp).slice(0, 8);
      $('section-home').innerHTML = `
        <div class="grid">
          <div class="panel span-5">
            <div class="panel-head"><div class="panel-title">Weekly balance</div><span class="tag blue">v${state.version || 0}</span></div>
            <div class="metric-row">
              <div class="metric"><span>Done</span><strong>${weekly.length}</strong></div>
              <div class="metric"><span>XP</span><strong>${money.format(totalXp)}</strong></div>
              <div class="metric"><span>Leader</span><strong style="font-size:18px;">${top ? `${escapeHtml(top.emoji)} ${escapeHtml(top.name)}` : '-'}</strong></div>
            </div>
          </div>
          <div class="panel span-7">
            <div class="panel-head"><div class="panel-title">Family fatigue</div><span class="mini">Rest threshold ${state.settings.vacationThreshold}</span></div>
            <div class="list">${state.members.map(renderMemberRow).join('')}</div>
          </div>
          <div class="panel span-5">
            <div class="panel-head"><div class="panel-title">Weekly ranking</div></div>
            <div class="list">${ranked.map((m, i) => renderRankRow(m, i + 1, weekly)).join('')}</div>
          </div>
          <div class="panel span-7">
            <div class="panel-head"><div class="panel-title">Family messages</div></div>
            <div class="field"><select id="messageTo">${messageOptions()}</select></div>
            <div class="field"><textarea id="messageText" data-testid="message-text" placeholder="Message"></textarea></div>
            <button class="btn primary full" data-testid="send-message" onclick="sendMessage()">Send</button>
            <div class="list" style="margin-top:12px;">${messages.length ? messages.map(renderMessage).join('') : '<div class="empty">No messages yet</div>'}</div>
          </div>
          <div class="panel span-12">
            <div class="panel-head"><div class="panel-title">Recent activity</div></div>
            <div class="list">${recent.length ? recent.map(renderActivity).join('') : '<div class="empty">No records yet</div>'}</div>
          </div>
        </div>`;
    }

    function renderMemberRow(m) {
      const fatigue = weekFatigue(m.id);
      const pct = Math.min(100, Math.round(fatigue / state.settings.vacationThreshold * 100));
      const tag = m.onVacation ? '<span class="tag amber">Rest</span>' : `<span class="tag teal">${fatigue}</span>`;
      return `<div class="member-row"><div class="avatar" style="background:${softColor(m.color)}">${escapeHtml(m.emoji)}</div><div class="grow"><div class="name-line"><strong>${escapeHtml(m.name)}</strong>${tag}</div><div class="progress"><span style="width:${pct}%;background:${pct >= 90 ? 'var(--red)' : 'var(--teal)'}"></span></div></div></div>`;
    }
    function renderRankRow(m, rank, weekly) {
      return `<div class="rank-row"><span class="tag ${rank === 1 ? 'amber' : 'blue'}">${rank}</span><div class="avatar" style="background:${softColor(m.color)}">${escapeHtml(m.emoji)}</div><div class="grow"><div class="name-line"><strong>${escapeHtml(m.name)}</strong><span class="tag teal">${xpFor(m, weekly)}XP</span></div><div class="mini">${countFor(m, weekly)} tasks</div></div></div>`;
    }
    function renderMessage(msg) {
      const from = member(msg.fromId);
      const to = msg.toId ? member(msg.toId) : null;
      return `<div class="message-row"><div class="name-line"><strong>${escapeHtml(from?.emoji || 'AD')} ${escapeHtml(from?.name || msg.fromId)}</strong><span class="mini">${formatTime(msg.timestamp)}</span></div><div>${escapeHtml(msg.text)}</div><div class="mini">To: ${to ? `${escapeHtml(to.emoji)} ${escapeHtml(to.name)}` : 'All'}</div></div>`;
    }
    function renderActivity(entry) {
      const m = member(entry.memberId);
      const c = chore(entry.choreId);
      return `<div class="activity-row"><div class="avatar" style="background:${softColor(m?.color)}">${escapeHtml(m?.emoji || 'U')}</div><div class="grow"><div class="name-line"><strong>${escapeHtml(m?.name || 'Unknown')}</strong><span class="mini">${formatTime(entry.timestamp)}</span></div><div class="mini">${escapeHtml(entry.choreEmoji || c?.emoji || 'OK')} ${escapeHtml(entry.choreName || c?.name || 'Task')} / +${entry.xpEarned || 0}XP / fatigue ${entry.fatigueAdded || 0}</div></div></div>`;
    }

    function renderTasks() {
      const allowed = firstAllowedMember();
      if (!selectedMemberId || !canActAs(member(selectedMemberId))) selectedMemberId = allowed?.id || state.members[0]?.id;
      const chores = state.chores.filter(c => selectedCategory === 'all' || c.category === selectedCategory);
      if (!selectedChoreId || !chores.find(c => c.id === selectedChoreId)) selectedChoreId = chores[0]?.id || null;
      $('section-tasks').innerHTML = `
        <div class="grid">
          <div class="panel span-12"><div class="panel-head"><div class="panel-title">Who did it?</div></div><div class="selector-grid">${state.members.map(renderMemberSelect).join('')}</div></div>
          <div class="panel span-12"><div class="panel-head"><div class="panel-title">What was done?</div></div><div class="segmented" style="margin-bottom:10px;">${Object.entries(CATEGORIES).map(([id, label]) => `<button class="chip ${selectedCategory === id ? 'active' : ''}" onclick="setCategory('${id}')">${label}</button>`).join('')}</div><div class="list" data-testid="chore-list">${chores.map(renderChoreSelect).join('')}</div><button class="btn primary full" data-testid="complete-task" style="margin-top:12px;" onclick="completeTask()">Complete</button></div>
        </div>`;
    }
    function renderMemberSelect(m) {
      const disabled = !canActAs(m);
      return `<button class="select-card ${selectedMemberId === m.id ? 'active' : ''} ${disabled ? 'disabled' : ''}" ${disabled ? 'disabled' : ''} onclick="selectMember('${m.id}')"><div class="avatar" style="background:${softColor(m.color)}">${escapeHtml(m.emoji)}</div><div><strong>${escapeHtml(m.name)}</strong><div class="mini">${m.restricted ? 'Owner/Admin' : 'Shared'}</div></div></button>`;
    }
    function renderChoreSelect(c) {
      return `<button class="chore-row ${selectedChoreId === c.id ? 'active' : ''}" onclick="selectChore('${c.id}')"><span class="avatar">${escapeHtml(c.emoji)}</span><span class="ellipsis"><strong>${escapeHtml(c.name)}</strong><br><span class="mini">${CATEGORIES[c.category] || c.category}</span></span><span class="tag blue">${c.xp}XP / ${c.fatigue}</span></button>`;
    }

    function renderCalendar() {
      const year = calendarMonth.getFullYear();
      const month = calendarMonth.getMonth();
      const first = new Date(year, month, 1);
      const start = new Date(first);
      const firstDay = (first.getDay() + 6) % 7;
      start.setDate(first.getDate() - firstDay);
      const days = Array.from({ length: 42 }, (_, i) => { const d = new Date(start); d.setDate(start.getDate() + i); return d; });
      const selectedEntries = entriesByDate(selectedDate);
      $('section-calendar').innerHTML = `
        <div class="grid">
          <div class="panel span-8"><div class="calendar-head"><button class="btn icon" onclick="moveMonth(-1)">&lt;</button><div class="panel-title">${year}-${String(month + 1).padStart(2, '0')}</div><button class="btn icon" onclick="moveMonth(1)">&gt;</button></div><div class="calendar-grid">${['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map(x => `<div class="weekday">${x}</div>`).join('')}${days.map(d => renderDay(d, month)).join('')}</div></div>
          <div class="panel span-4"><div class="panel-head"><div class="panel-title">${selectedDate}</div></div><div class="list">${selectedEntries.length ? selectedEntries.map(renderActivity).join('') : '<div class="empty">No records on this date</div>'}</div></div>
        </div>`;
    }
    function renderDay(d, currentMonth) {
      const key = dateKey(d.getTime());
      const entries = entriesByDate(key);
      const classes = ['day'];
      if (d.getMonth() !== currentMonth) classes.push('out');
      if (key === dateKey(Date.now())) classes.push('today');
      if (key === selectedDate) classes.push('active');
      return `<button class="${classes.join(' ')}" onclick="selectDate('${key}')"><strong>${d.getDate()}</strong><div class="dot-row">${entries.slice(0, 8).map(() => '<span class="dot"></span>').join('')}</div></button>`;
    }

    function renderBadges() {
      const selected = member(badgeMemberId) || state.members[0];
      badgeMemberId = selected?.id;
      const weekly = weekHistory();
      const earned = new Set(selected?.earnedBadges || []);
      $('section-badges').innerHTML = `<div class="grid"><div class="panel span-12"><div class="segmented">${state.members.map(m => `<button class="chip ${badgeMemberId === m.id ? 'active' : ''}" onclick="selectBadgeMember('${m.id}')">${escapeHtml(m.emoji)} ${escapeHtml(m.name)}</button>`).join('')}</div></div><div class="panel span-12"><div class="panel-head"><div class="panel-title">${escapeHtml(selected?.emoji || '')} ${escapeHtml(selected?.name || '')}</div><span class="mini">${countFor(selected, weekly)} tasks this week</span></div><div class="badge-grid">${BADGES.map(b => { const unlocked = earned.has(b.id) || b.cond(selected, weekly); return `<div class="badge-item ${unlocked ? '' : 'locked'}"><div class="badge-emoji">${b.emoji}</div><strong>${escapeHtml(b.name)}</strong><div class="mini">${escapeHtml(b.desc)}</div><span class="tag ${unlocked ? 'teal' : ''}">${unlocked ? 'Unlocked' : 'Locked'}</span></div>`; }).join('')}</div></div></div>`;
    }

    function renderSettings() {
      if (!session?.isAdmin) {
        $('section-settings').innerHTML = `<div class="panel"><div class="panel-title">Settings</div><div class="empty" style="margin-top:12px;">Admin account required</div></div>`;
        return;
      }
      $('section-settings').innerHTML = `
        <div class="grid">
          <div class="panel span-6"><div class="panel-head"><div class="panel-title">Operation</div></div><div class="form-grid"><div class="field col-6"><label>Rest threshold</label><input id="vacationThreshold" type="number" min="5" max="100" value="${state.settings.vacationThreshold}"></div><div class="field col-6"><label>Week starts</label><select id="weekStartsOn"><option value="1" ${state.settings.weekStartsOn === 1 ? 'selected' : ''}>Monday</option><option value="0" ${state.settings.weekStartsOn === 0 ? 'selected' : ''}>Sunday</option></select></div><button class="btn primary col-6" onclick="saveSettings()">Save</button><button class="btn col-6" onclick="exportDailySummary()">Export daily summary</button><button class="btn danger col-6" onclick="resetWeek()">Delete this week</button><button class="btn danger col-6" onclick="resetAll()">Reset all</button></div></div>
          <div class="panel span-6"><div class="panel-head"><div class="panel-title">Members</div></div><div class="form-grid"><div class="field col-3"><label>Icon</label><input id="memberEmoji" maxlength="4" value="U"></div><div class="field col-4"><label>Name</label><input id="memberName" placeholder="Name"></div><div class="field col-3"><label>Mode</label><select id="memberRestricted"><option value="false">Shared</option><option value="true">Owner</option></select></div><button class="btn primary col-2" onclick="addMember()">Add</button></div><div class="list" style="margin-top:10px;">${state.members.map(renderMemberSetting).join('')}</div></div>
          <div class="panel span-6"><div class="panel-head"><div class="panel-title">Chores</div></div><div class="form-grid"><div class="field col-2"><label>Icon</label><input id="choreEmoji" maxlength="4" value="OK"></div><div class="field col-4"><label>Name</label><input id="choreName" placeholder="Chore"></div><div class="field col-3"><label>Category</label><select id="choreCategory">${Object.entries(CATEGORIES).filter(x => x[0] !== 'all').map(([id, label]) => `<option value="${id}">${label}</option>`).join('')}</select></div><div class="field col-2"><label>Fatigue</label><input id="choreFatigue" type="number" min="1" max="10" value="2"></div><button class="btn primary col-1" onclick="addChore()">+</button></div><div class="list" style="margin-top:10px;">${state.chores.map(renderChoreSetting).join('')}</div></div>
          <div class="panel span-6"><div class="panel-head"><div class="panel-title">Accounts</div></div><div class="form-grid"><div class="field col-3"><label>ID</label><input id="accountId" placeholder="id"></div><div class="field col-3"><label>Password</label><input id="accountPw" placeholder="password"></div><div class="field col-4"><label>Member</label><select id="accountMember"><option value="">Admin</option>${state.members.map(m => `<option value="${m.id}">${escapeHtml(m.emoji)} ${escapeHtml(m.name)}</option>`).join('')}</select></div><button class="btn primary col-2" onclick="addAccount()">Add</button></div><div class="list" style="margin-top:10px;">${state.accounts.map(renderAccountSetting).join('')}</div></div>
        </div>`;
    }
    function renderMemberSetting(m) { return `<div class="account-row"><div class="avatar" style="background:${softColor(m.color)}">${escapeHtml(m.emoji)}</div><div class="grow"><strong>${escapeHtml(m.name)}</strong><div class="mini">${m.restricted ? 'Owner/Admin' : 'Shared'}</div></div><button class="btn icon danger" onclick="removeMember('${m.id}')">X</button></div>`; }
    function renderChoreSetting(c) { return `<div class="account-row"><div class="avatar">${escapeHtml(c.emoji)}</div><div class="grow"><strong>${escapeHtml(c.name)}</strong><div class="mini">${CATEGORIES[c.category]} / fatigue ${c.fatigue} / ${c.xp}XP</div></div><button class="btn icon danger" onclick="removeChore('${c.id}')">X</button></div>`; }
    function renderAccountSetting(acc) { const m = member(acc.memberId); const label = acc.isAdmin ? 'Admin' : `${m?.emoji || ''} ${m?.name || 'No member'}`; return `<div class="account-row"><span class="tag blue">${escapeHtml(acc.id)}</span><div class="grow">${escapeHtml(label)}<div class="mini">${acc.password.replace(/./g, '*')}</div></div><button class="btn icon danger" onclick="removeAccount('${acc.id}')">X</button></div>`; }

    function selectMember(id) { selectedMemberId = id; renderTasks(); }
    function selectChore(id) { selectedChoreId = id; renderTasks(); }
    function setCategory(id) { selectedCategory = id; selectedChoreId = null; renderTasks(); }
    function selectDate(key) { selectedDate = key; renderCalendar(); }
    function selectBadgeMember(id) { badgeMemberId = id; renderBadges(); }
    function moveMonth(delta) { calendarMonth = new Date(calendarMonth.getFullYear(), calendarMonth.getMonth() + delta, 1); renderCalendar(); }

    async function completeTask() {
      const m = member(selectedMemberId);
      const c = chore(selectedChoreId);
      if (!m || !c || !canActAs(m)) return;
      const entry = { id: `h${Date.now()}`, memberId: m.id, choreId: c.id, choreName: c.name, choreEmoji: c.emoji, category: c.category, fatigueAdded: Number(c.fatigue), xpEarned: Number(c.xp), timestamp: Date.now() };
      state.history.push(entry);
      m.completedTasks = Number(m.completedTasks || 0) + 1;
      m.totalFatigue = Number(m.totalFatigue || 0) + Number(c.fatigue);
      m.xp = Number(m.xp || 0) + Number(c.xp);
      m.stickers = Number(m.stickers || 0) + 1;
      const newBadges = grantBadges(m);
      await saveState(false);
      showSuccess('OK', `${m.name} completed`, `${c.name} / +${c.xp}XP${newBadges.length ? ` / new badge ${newBadges.map(b => b.emoji).join(' ')}` : ''}`);
    }

    async function sendMessage() {
      const text = $('messageText').value.trim();
      if (!text) return toast('Enter a message');
      const acc = account(session.accountId);
      const fromId = acc?.memberId || 'admin';
      state.messages.push({ id: `msg${Date.now()}`, fromId, toId: $('messageTo').value || null, text, timestamp: Date.now() });
      grantBadges(member(fromId));
      await saveState(false);
      toast('Message sent');
    }

    async function saveSettings() {
      state.settings.vacationThreshold = clamp(Number($('vacationThreshold').value || 25), 5, 100);
      state.settings.weekStartsOn = Number($('weekStartsOn').value);
      await saveState();
    }
    async function addMember() {
      const name = $('memberName').value.trim();
      if (!name) return toast('Enter a name');
      const id = `m${Date.now()}`;
      state.members.push(memberSeed(id, name, $('memberEmoji').value.trim() || 'U', $('memberRestricted').value === 'true', randomColor()));
      await saveState();
    }
    async function removeMember(id) {
      if (!confirm('Delete member?')) return;
      state.members = state.members.filter(m => m.id !== id);
      state.history = state.history.filter(h => h.memberId !== id);
      state.messages = state.messages.filter(m => m.fromId !== id && m.toId !== id);
      state.accounts = state.accounts.map(a => a.memberId === id ? { ...a, memberId: null, isAdmin: true } : a);
      await saveState();
    }
    async function addChore() {
      const name = $('choreName').value.trim();
      if (!name) return toast('Enter a chore name');
      const fatigue = clamp(Number($('choreFatigue').value || 2), 1, 10);
      state.chores.push(choreSeed(`c${Date.now()}`, name, $('choreEmoji').value.trim() || 'OK', fatigue, $('choreCategory').value));
      await saveState();
    }
    async function removeChore(id) {
      if (!confirm('Delete chore?')) return;
      state.chores = state.chores.filter(c => c.id !== id);
      if (selectedChoreId === id) selectedChoreId = null;
      await saveState();
    }
    async function addAccount() {
      const id = $('accountId').value.trim();
      const pw = $('accountPw').value.trim();
      const memberId = $('accountMember').value || null;
      if (!id || !pw) return toast('Enter ID and password');
      if (state.accounts.some(a => a.id === id)) return toast('Account already exists');
      state.accounts.push({ id, password: pw, memberId, isAdmin: !memberId });
      await saveState();
    }
    async function removeAccount(id) {
      if (id === session.accountId) return toast('Cannot delete current account');
      if (!confirm('Delete account?')) return;
      state.accounts = state.accounts.filter(a => a.id !== id);
      await saveState();
    }
    async function resetWeek() {
      if (!confirm('Delete this week records?')) return;
      const ws = weekStartTs();
      state.history = state.history.filter(h => Number(h.timestamp) < ws);
      state.badgeHistory = state.badgeHistory.filter(h => Number(h.timestamp) < ws);
      recalcMemberTotals();
      await saveState();
    }
    async function resetAll() {
      if (!confirm('Reset all app data?')) return;
      state = defaultState();
      sessionStorage.removeItem(SESSION_KEY);
      await saveState(false);
      session = null;
      showLogin();
    }
    async function exportDailySummary() {
      const summary = buildDailySummary();
      await api('/api/daily-summary', { method: 'POST', body: JSON.stringify(summary) });
      toast('Daily summary exported');
    }

    function grantBadges(m) {
      if (!m) return [];
      if (!Array.isArray(m.earnedBadges)) m.earnedBadges = [];
      const weekly = weekHistory();
      const created = [];
      BADGES.forEach(b => {
        if (!m.earnedBadges.includes(b.id) && b.cond(m, weekly)) {
          m.earnedBadges.push(b.id);
          state.badgeHistory.push({ id: `b${Date.now()}${b.id}`, memberId: m.id, badgeId: b.id, name: b.name, emoji: b.emoji, timestamp: Date.now() });
          created.push(b);
        }
      });
      return created;
    }
    function updateVacationFlags(target) {
      const limit = Number(target.settings?.vacationThreshold || 25);
      const weekStart = weekStartTsFor(target);
      target.members?.forEach(m => {
        m.onVacation = target.history.filter(h => h.memberId === m.id && Number(h.timestamp) >= weekStart).reduce((sum, h) => sum + Number(h.fatigueAdded || 0), 0) >= limit;
      });
    }
    function recalcMemberTotals() {
      state.members.forEach(m => {
        const mine = state.history.filter(h => h.memberId === m.id);
        m.completedTasks = mine.length;
        m.totalFatigue = mine.reduce((s, h) => s + Number(h.fatigueAdded || 0), 0);
        m.xp = mine.reduce((s, h) => s + Number(h.xpEarned || 0), 0);
        m.stickers = mine.length;
      });
    }
    function buildDailySummary() {
      const start = startOfDay(Date.now());
      const tasks = state.history.filter(h => h.timestamp >= start).map(h => {
        const m = member(h.memberId);
        return { memberName: m?.name || h.memberId, memberEmoji: m?.emoji || 'U', choreName: h.choreName || chore(h.choreId)?.name || 'Task', choreEmoji: h.choreEmoji || chore(h.choreId)?.emoji || 'OK', xp: h.xpEarned || 0, time: formatClock(h.timestamp) };
      });
      const messages = state.messages.filter(m => m.timestamp >= start).map(msg => {
        const from = member(msg.fromId);
        const to = msg.toId ? member(msg.toId) : null;
        return { from: from?.name || msg.fromId, fromEmoji: from?.emoji || 'AD', to: to?.name || 'All', text: msg.text, time: formatClock(msg.timestamp) };
      });
      return { date: dateKey(Date.now()), tasks, messages };
    }

    function messageOptions() { return `<option value="">All</option>${state.members.map(m => `<option value="${m.id}">${escapeHtml(m.emoji)} ${escapeHtml(m.name)}</option>`).join('')}`; }
    function firstAllowedMember() { return state.members.find(canActAs); }
    function canActAs(m) {
      if (!m || !session) return false;
      if (session.isAdmin) return true;
      if (session.memberId === m.id) return true;
      return !m.restricted;
    }
    function account(id) { return state.accounts.find(a => a.id === id); }
    function member(id) { return state.members.find(m => m.id === id); }
    function chore(id) { return state.chores.find(c => c.id === id); }
    function countFor(m, h) { return m ? h.filter(x => x.memberId === m.id).length : 0; }
    function xpFor(m, h) { return m ? h.filter(x => x.memberId === m.id).reduce((s, x) => s + Number(x.xpEarned || 0), 0) : 0; }
    function fatigueFor(m, h) { return m ? h.filter(x => x.memberId === m.id).reduce((s, x) => s + Number(x.fatigueAdded || 0), 0) : 0; }
    function weekFatigue(memberId) { return weekHistory().filter(x => x.memberId === memberId).reduce((s, x) => s + Number(x.fatigueAdded || 0), 0); }
    function weekHistory() { const ws = weekStartTs(); return state.history.filter(h => Number(h.timestamp) >= ws); }
    function weekStartTs() { return weekStartTsFor(state); }
    function weekStartTsFor(target) {
      const d = new Date();
      d.setHours(0, 0, 0, 0);
      const startsOn = Number(target.settings?.weekStartsOn ?? 1);
      const diff = (d.getDay() - startsOn + 7) % 7;
      d.setDate(d.getDate() - diff);
      return d.getTime();
    }
    function entriesByDate(key) { return state.history.filter(h => dateKey(h.timestamp) === key).sort((a, b) => a.timestamp - b.timestamp); }
    function startOfDay(ts) { const d = new Date(ts); d.setHours(0, 0, 0, 0); return d.getTime(); }
    function dateKey(ts) { const d = new Date(ts); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`; }
    function formatClock(ts) { return new Date(Number(ts)).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' }); }
    function formatTime(ts) { return `${dateKey(ts)} ${formatClock(ts)}`; }
    function readJson(text) { try { return JSON.parse(text); } catch { return null; } }
    function escapeHtml(value) { return String(value ?? '').replace(/[&<>"']/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch])); }
    function clamp(n, min, max) { return Math.max(min, Math.min(max, Number.isFinite(n) ? n : min)); }
    function softColor(color = '#2563eb') { return `${color}18`; }
    function randomColor() { return ['#2563eb', '#0f9f8f', '#f59e0b', '#ef4444', '#7c3aed', '#0891b2'][Math.floor(Math.random() * 6)]; }
    function setStatus(text) { $('syncStatus').textContent = `${text} / ${API_MODE ? location.host : 'file'}`; }
    function toast(text) {
      const el = $('toast');
      el.textContent = text;
      el.classList.add('show');
      clearTimeout(el.timer);
      el.timer = setTimeout(() => el.classList.remove('show'), 2400);
    }
    function showSuccess(emoji, title, message) {
      $('successEmoji').textContent = emoji;
      $('successTitle').textContent = title;
      $('successMessage').textContent = message;
      $('successOverlay').hidden = false;
    }
  </script>
</body>
</html>

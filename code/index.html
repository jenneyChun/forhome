<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>우리집 히어로</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #fff;
      --line: #dbe3ef;
      --text: #172033;
      --muted: #687386;
      --blue: #2563eb;
      --blue-soft: #e9f0ff;
      --teal: #0f9f8f;
      --teal-soft: #e5f7f3;
      --amber: #f59e0b;
      --amber-soft: #fff3d7;
      --red: #ef4444;
      --red-soft: #ffe8e8;
      --shadow: 0 8px 24px rgba(23, 32, 51, .08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", "Malgun Gothic", system-ui, sans-serif;
      letter-spacing: 0;
    }
    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }
    button:disabled { cursor: not-allowed; opacity: .45; }
    [hidden] { display: none !important; }
    .login-screen {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        linear-gradient(120deg, rgba(37, 99, 235, .12), transparent 38%),
        linear-gradient(260deg, rgba(15, 159, 143, .16), transparent 42%),
        var(--bg);
    }
    .login-box, .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 2px 10px rgba(23, 32, 51, .04);
    }
    .login-box {
      width: min(100%, 380px);
      padding: 24px;
      box-shadow: var(--shadow);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .brand-mark {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: var(--blue-soft);
      color: var(--blue);
      font-weight: 900;
      font-size: 22px;
      flex: 0 0 auto;
    }
    .brand h1 { margin: 0; font-size: 22px; line-height: 1.2; }
    .brand p { margin: 4px 0 0; color: var(--muted); font-size: 13px; }
    .field { display: grid; gap: 6px; margin-bottom: 12px; }
    .field label { color: var(--muted); font-size: 12px; font-weight: 700; }
    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      padding: 10px 12px;
      outline: none;
    }
    textarea { min-height: 86px; resize: vertical; }
    input:focus, select:focus, textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, .12);
    }
    .error { min-height: 18px; color: var(--red); font-size: 12px; margin: 4px 0 10px; }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(255, 255, 255, .94);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(12px);
    }
    .topbar-inner {
      max-width: 1120px;
      margin: 0 auto;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .app-title {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }
    .app-title strong { display: block; font-size: 17px; white-space: nowrap; }
    .status-line {
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 52vw;
    }
    .user-area { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .user-pill {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 999px;
      padding: 7px 10px;
      color: var(--text);
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 6px;
      max-width: 170px;
    }
    .layout {
      max-width: 1120px;
      margin: 0 auto;
      padding: 16px;
      display: grid;
      grid-template-columns: 176px minmax(0, 1fr);
      gap: 16px;
    }
    .tabbar {
      display: grid;
      gap: 8px;
      align-self: start;
      position: sticky;
      top: 74px;
    }
    .tab-btn {
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 0 12px;
      font-weight: 700;
    }
    .tab-btn.active {
      border-color: var(--blue);
      background: var(--blue-soft);
      color: var(--blue);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      gap: 12px;
    }
    .panel { padding: 14px; }
    .span-4 { grid-column: span 4; }
    .span-5 { grid-column: span 5; }
    .span-6 { grid-column: span 6; }
    .span-7 { grid-column: span 7; }
    .span-8 { grid-column: span 8; }
    .span-12 { grid-column: span 12; }
    .section { display: none; }
    .section.active { display: block; }
    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }
    .panel-title { font-size: 15px; font-weight: 800; }
    .mini { color: var(--muted); font-size: 12px; }
    .metric-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .metric {
      min-height: 76px;
      border-radius: 8px;
      padding: 10px;
      background: #f8fafc;
      border: 1px solid #edf2f7;
    }
    .metric strong { display: block; margin-top: 5px; font-size: 22px; }
    .metric span { color: var(--muted); font-size: 12px; }
    .list { display: grid; gap: 8px; }
    .member-row, .activity-row, .message-row, .rank-row, .badge-item, .chore-row, .account-row {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 10px;
    }
    .member-row, .rank-row, .activity-row, .account-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      font-weight: 900;
      flex: 0 0 auto;
      background: #f1f5f9;
    }
    .grow { min-width: 0; flex: 1; }
    .name-line {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }
    .name-line strong, .ellipsis {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .progress { height: 8px; border-radius: 999px; overflow: hidden; background: #e8edf5; }
    .progress > span { display: block; height: 100%; border-radius: 999px; background: var(--teal); }
    .tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 22px;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 11px;
      font-weight: 800;
      color: var(--muted);
      background: #f1f5f9;
      white-space: nowrap;
    }
    .tag.blue { color: var(--blue); background: var(--blue-soft); }
    .tag.teal { color: var(--teal); background: var(--teal-soft); }
    .tag.amber { color: #a16207; background: var(--amber-soft); }
    .tag.red { color: var(--red); background: var(--red-soft); }
    .btn {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      padding: 8px 12px;
      font-weight: 800;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }
    .btn.primary { border-color: var(--blue); background: var(--blue); color: #fff; }
    .btn.danger { border-color: #fecaca; background: var(--red-soft); color: var(--red); }
    .btn.icon { width: 38px; padding: 0; flex: 0 0 auto; }
    .btn.full { width: 100%; }
    .segmented { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; }
    .chip {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--muted);
      min-height: 34px;
      padding: 6px 12px;
      font-weight: 800;
      white-space: nowrap;
    }
    .chip.active { background: var(--blue-soft); color: var(--blue); border-color: var(--blue); }
    .selector-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 8px; }
    .select-card {
      min-height: 64px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      text-align: left;
    }
    .select-card.active { border-color: var(--blue); background: var(--blue-soft); }
    .select-card.disabled { opacity: .42; }
    .chore-row {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      text-align: left;
    }
    .chore-row.active { border-color: var(--blue); background: var(--blue-soft); }
    .calendar-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 12px; }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 6px; }
    .weekday { color: var(--muted); font-size: 12px; text-align: center; font-weight: 800; padding: 4px 0; }
    .day { min-height: 82px; border: 1px solid var(--line); border-radius: 8px; background: #fff; padding: 7px; text-align: left; }
    .day.today { border-color: var(--teal); background: var(--teal-soft); }
    .day.active { border-color: var(--blue); box-shadow: 0 0 0 2px rgba(37, 99, 235, .12); }
    .day.out { opacity: .42; }
    .dot-row { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 8px; }
    .dot { width: 7px; height: 7px; border-radius: 999px; background: var(--amber); }
    .badge-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(145px, 1fr)); gap: 8px; }
    .badge-item { min-height: 112px; display: grid; gap: 6px; align-content: start; }
    .badge-item.locked { opacity: .42; }
    .badge-emoji { font-size: 24px; font-weight: 900; }
    .form-grid { display: grid; grid-template-columns: repeat(12, minmax(0, 1fr)); gap: 8px; align-items: end; }
    .col-2 { grid-column: span 2; }
    .col-3 { grid-column: span 3; }
    .col-4 { grid-column: span 4; }
    .col-5 { grid-column: span 5; }
    .col-6 { grid-column: span 6; }
    .col-12 { grid-column: span 12; }
    .empty {
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 18px;
      color: var(--muted);
      text-align: center;
      background: #fbfdff;
    }
    .toast {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      min-width: min(420px, calc(100vw - 32px));
      background: #172033;
      color: #fff;
      border-radius: 8px;
      padding: 12px 14px;
      box-shadow: var(--shadow);
      z-index: 40;
      display: none;
    }
    .toast.show { display: block; }
    .photo-cell {
      width: 88px;
      height: 66px;
      object-fit: cover;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f1f5f9;
      flex: 0 0 auto;
    }
    .proof-preview {
      width: 100%;
      max-height: 180px;
      object-fit: cover;
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-top: 8px;
      background: #f1f5f9;
    }
    .review-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }
    .review-row, .plan-row {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 10px;
    }
    .review-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      flex-wrap: wrap;
    }
    .review-row .review-row {
      border: 0;
      padding: 0;
    }
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 35;
      background: rgba(23, 32, 51, .44);
      display: grid;
      place-items: center;
      padding: 16px;
    }
    .dialog {
      width: min(100%, 360px);
      background: #fff;
      border-radius: 8px;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      padding: 18px;
      text-align: center;
    }
    .dialog-emoji { font-size: 34px; font-weight: 900; margin-bottom: 8px; }
    .dialog h2 { margin: 0 0 8px; font-size: 20px; }
    .dialog p { margin: 0 0 14px; color: var(--muted); line-height: 1.55; }
    @media (max-width: 820px) {
      .topbar-inner { padding: 10px 12px; }
      .status-line { max-width: 42vw; }
      .layout { grid-template-columns: 1fr; padding: 12px; padding-bottom: 86px; }
      .tabbar {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        top: auto;
        z-index: 25;
        grid-template-columns: repeat(5, 1fr);
        gap: 0;
        padding: 6px 6px 8px;
        background: rgba(255, 255, 255, .96);
        border-top: 1px solid var(--line);
        backdrop-filter: blur(12px);
      }
      .tab-btn { height: 50px; border-color: transparent; background: transparent; display: grid; place-items: center; gap: 2px; padding: 4px; font-size: 11px; }
      .grid { gap: 10px; }
      .span-4, .span-5, .span-6, .span-7, .span-8, .span-12 { grid-column: span 12; }
      .metric-row { grid-template-columns: 1fr 1fr; }
      .day { min-height: 58px; padding: 5px; }
      .photo-cell { width: 72px; height: 58px; }
      .user-pill { max-width: 110px; }
      .form-grid { grid-template-columns: 1fr; }
      .col-2, .col-3, .col-4, .col-5, .col-6, .col-12 { grid-column: 1; }
    }
  </style>
</head>
<body>
  <section class="login-screen" id="loginScreen">
    <div class="login-box">
      <div class="brand">
        <div class="brand-mark">집</div>
        <div>
          <h1>우리집 히어로</h1>
          <p id="loginServerText">저장소 연결 확인 중</p>
        </div>
      </div>
      <div class="field">
        <label for="loginId">아이디</label>
        <input id="loginId" data-testid="login-id" autocomplete="username" value="admin">
      </div>
      <div class="field">
        <label for="loginPw">비밀번호</label>
        <input id="loginPw" data-testid="login-password" type="password" autocomplete="current-password" value="admin1234">
      </div>
      <div class="error" id="loginError"></div>
      <button class="btn primary full" data-testid="login-submit" id="loginButton">로그인</button>
    </div>
  </section>

  <section class="app-shell" id="appShell" hidden>
    <header class="topbar">
      <div class="topbar-inner">
        <div class="app-title">
          <div class="brand-mark" style="width:38px;height:38px;font-size:16px;">집</div>
          <div>
            <strong>우리집 히어로</strong>
            <div class="status-line" id="syncStatus">동기화 준비 중</div>
          </div>
        </div>
        <div class="user-area">
          <button class="user-pill" id="currentUser" title="Logout"></button>
          <button class="btn icon" id="reloadButton" title="Refresh">R</button>
        </div>
      </div>
    </header>

    <div class="layout">
      <nav class="tabbar" aria-label="Main menu">
        <button class="tab-btn active" data-tab="home" data-testid="tab-home"><span>오늘</span></button>
        <button class="tab-btn" data-tab="tasks" data-testid="tab-tasks"><span>기록</span></button>
        <button class="tab-btn" data-tab="badges" data-testid="tab-badges"><span>확인</span></button>
        <button class="tab-btn" data-tab="calendar" data-testid="tab-calendar"><span>내일</span></button>
        <button class="tab-btn" data-tab="settings" data-testid="tab-settings"><span>설정</span></button>
      </nav>

      <main class="content">
        <section class="section active" id="section-home" data-testid="section-home"></section>
        <section class="section" id="section-tasks" data-testid="section-tasks"></section>
        <section class="section" id="section-calendar" data-testid="section-calendar"></section>
        <section class="section" id="section-badges" data-testid="section-badges"></section>
        <section class="section" id="section-settings" data-testid="section-settings"></section>
      </main>
    </div>
  </section>

  <div class="overlay" id="successOverlay" hidden>
    <div class="dialog">
      <div class="dialog-emoji" id="successEmoji">완료</div>
      <h2 id="successTitle">기록했습니다</h2>
      <p id="successMessage"></p>
      <button class="btn primary full" id="closeDialog">확인</button>
    </div>
  </div>
  <div class="toast" id="toast"></div>

  <script>
    const FIREBASE_CONFIG = {
      apiKey: 'AIzaSyCExIizXG3OitWMXBElM7RDMqT6jTKS-xE',
      authDomain: 'forhome-19317.firebaseapp.com',
      projectId: 'forhome-19317',
      storageBucket: 'forhome-19317.firebasestorage.app',
      messagingSenderId: '598577686461',
      appId: '1:598577686461:web:248472a3ce70800f4354d4'
    };
    const FIRESTORE_FAMILY_ID = 'forhome';
    const FIRESTORE_STATE_PATH = `families/${FIRESTORE_FAMILY_ID}/state/app`;
    const AUTH_EMAIL_DOMAIN = 'forhome.local';
    const SESSION_KEY = 'forhome-session-v1';
    const TEST_STORAGE_KEY = 'forhome-test-state-v1';
    const STORAGE_MODE = new URLSearchParams(location.search).get('storage');
    const LOCAL_HOSTS = new Set(['localhost', '127.0.0.1', '::1']);
    const TEST_MODE = STORAGE_MODE === 'test'
      || (!STORAGE_MODE && LOCAL_HOSTS.has(location.hostname))
      || window.__FORHOME_TEST__ === true;
    const CATEGORIES = { all: '전체', house: '집안', care: '돌봄', pet: '반려동물', child: '아이' };
    const BADGES = [
      { id: 'first', emoji: 'B1', name: 'First task', desc: 'Complete one task this week', cond: (m, h) => countFor(m, h) >= 1 },
      { id: 'five', emoji: 'B5', name: 'Steady', desc: 'Complete five tasks this week', cond: (m, h) => countFor(m, h) >= 5 },
      { id: 'ten', emoji: 'B10', name: 'Hero', desc: 'Complete ten tasks this week', cond: (m, h) => countFor(m, h) >= 10 },
      { id: 'xp100', emoji: 'XP', name: '100 XP', desc: 'Earn 100 XP this week', cond: (m, h) => xpFor(m, h) >= 100 },
      { id: 'fat20', emoji: 'FT', name: 'Heavy lift', desc: 'Reach fatigue 20 this week', cond: (m, h) => fatigueFor(m, h) >= 20 },
      { id: 'msg', emoji: 'MS', name: 'Messenger', desc: 'Send a family message', cond: (m) => state.messages.some(x => x.fromId === m.id) }
    ];
    const defaultState = () => ({
      version: 0,
      updatedAt: new Date().toISOString(),
      settings: { vacationThreshold: 25, weekStartsOn: 1 },
      members: [
        memberSeed('mom', '엄마', '엄', true, '#ef4444'),
        memberSeed('dad', '아빠', '아', true, '#2563eb'),
        memberSeed('son', '아들', '들', false, '#f59e0b')
      ],
      accounts: [
        { id: 'mom', password: 'mom1234', memberId: 'mom', isAdmin: false },
        { id: 'dad', password: 'dad1234', memberId: 'dad', isAdmin: false },
        { id: 'son', password: 'son1234', memberId: 'son', isAdmin: false },
        { id: 'admin', password: 'admin1234', memberId: null, isAdmin: true }
      ],
      chores: [
        choreSeed('c1', '설거지', '식', 2, 'house'),
        choreSeed('c2', '청소기 돌리기', '청', 3, 'house'),
        choreSeed('c3', '빨래', '빨', 2, 'house'),
        choreSeed('p1', '약 챙기기', '약', 2, 'care'),
        choreSeed('pet1', '밥 주기', '밥', 1, 'pet'),
        choreSeed('ch1', '방 정리', '방', 1, 'child')
      ],
      history: [],
      messages: [],
      tomorrowPlans: [],
      badgeHistory: []
    });
    function memberSeed(id, name, emoji, restricted, color) {
      return { id, name, emoji, restricted, color, xp: 0, totalFatigue: 0, completedTasks: 0, stickers: 0, onVacation: false, earnedBadges: [] };
    }
    function choreSeed(id, name, emoji, fatigue, category) {
      return { id, name, emoji, fatigue, xp: fatigue * 10, category };
    }

    let state = defaultState();
    let session = null;
    let activeTab = 'home';
    let selectedMemberId = null;
    let selectedChoreId = null;
    let selectedCategory = 'all';
    let badgeMemberId = null;
    let calendarMonth = new Date();
    let selectedDate = dateKey(Date.now());
    let saving = false;
    let storageProvider = null;
    let unsubscribeState = null;

    const $ = (id) => document.getElementById(id);
    const money = new Intl.NumberFormat('en-US');

    document.addEventListener('DOMContentLoaded', init);
    $('loginButton').addEventListener('click', doLogin);
    $('loginPw').addEventListener('keydown', (e) => { if (e.key === 'Enter') doLogin(); });
    $('currentUser').addEventListener('click', logout);
    $('reloadButton').addEventListener('click', hardReload);
    $('closeDialog').addEventListener('click', () => $('successOverlay').hidden = true);
    document.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', () => showTab(btn.dataset.tab)));

    function createStorageProvider() {
      return TEST_MODE ? createTestStorageProvider() : createFirebaseStorageProvider();
    }

    function authEmailFor(accountId) {
      return `${String(accountId || '').trim().toLowerCase()}@${AUTH_EMAIL_DOMAIN}`;
    }

    function accountIdFromEmail(email) {
      const lower = String(email || '').trim().toLowerCase();
      const suffix = `@${AUTH_EMAIL_DOMAIN}`;
      return lower.endsWith(suffix) ? lower.slice(0, -suffix.length) : lower;
    }

    function accountTemplate(accountId) {
      const id = String(accountId || '').trim();
      return (state.accounts || []).find(a => a.id === id) || defaultState().accounts.find(a => a.id === id);
    }

    function sessionForAccountId(accountId) {
      const acc = accountTemplate(accountId);
      return acc ? { accountId: acc.id, memberId: acc.memberId, isAdmin: !!acc.isAdmin } : null;
    }

    function createTestStorageProvider() {
      return {
        mode: 'test',
        label: 'Playwright mock storage',
        async initialize() {},
        getCurrentSession() {
          return readJson(sessionStorage.getItem(SESSION_KEY));
        },
        async login(accountId, password) {
          const acc = defaultState().accounts.find(a => a.id === accountId && a.password === password);
          if (!acc) throw new Error('아이디와 비밀번호를 확인해 주세요.');
          return { accountId: acc.id, memberId: acc.memberId, isAdmin: !!acc.isAdmin };
        },
        async logout() {},
        async loadState() {
          const saved = readJson(localStorage.getItem(TEST_STORAGE_KEY));
          if (saved) return saved;
          const seeded = { ...defaultState(), version: 1, updatedAt: new Date().toISOString() };
          localStorage.setItem(TEST_STORAGE_KEY, JSON.stringify(seeded));
          return seeded;
        },
        async saveState(next) {
          const current = readJson(localStorage.getItem(TEST_STORAGE_KEY));
          const saved = { ...next, version: Number(current?.version || next.version || 0) + 1, updatedAt: new Date().toISOString() };
          localStorage.setItem(TEST_STORAGE_KEY, JSON.stringify(saved));
          window.dispatchEvent(new CustomEvent('forhome-test-state-updated', { detail: saved }));
          return saved;
        },
        subscribeState(onState) {
          const onStorage = (event) => {
            if (event.key !== TEST_STORAGE_KEY || !event.newValue) return;
            const next = readJson(event.newValue);
            if (next) onState(next);
          };
          const onLocal = (event) => onState(event.detail);
          window.addEventListener('storage', onStorage);
          window.addEventListener('forhome-test-state-updated', onLocal);
          return () => {
            window.removeEventListener('storage', onStorage);
            window.removeEventListener('forhome-test-state-updated', onLocal);
          };
        },
        getCurrentAccountId() {
          return this.getCurrentSession()?.accountId || null;
        }
      };
    }

    function loadScript(src) {
      return new Promise((resolve, reject) => {
        const existing = document.querySelector(`script[src="${src}"]`);
        if (existing) {
          existing.addEventListener('load', resolve, { once: true });
          existing.addEventListener('error', reject, { once: true });
          if (existing.dataset.loaded === 'true') resolve();
          return;
        }
        const script = document.createElement('script');
        script.src = src;
        script.onload = () => {
          script.dataset.loaded = 'true';
          resolve();
        };
        script.onerror = () => reject(new Error(`Failed to load ${src}`));
        document.head.appendChild(script);
      });
    }

    async function loadFirebaseSdk() {
      if (window.firebase?.auth && window.firebase?.firestore) return;
      const base = 'https://www.gstatic.com/firebasejs/10.14.1';
      await loadScript(`${base}/firebase-app-compat.js`);
      await loadScript(`${base}/firebase-auth-compat.js`);
      await loadScript(`${base}/firebase-firestore-compat.js`);
    }

    function createFirebaseStorageProvider() {
      let auth = null;
      let db = null;
      let stateRef = null;
      return {
        mode: 'firebase',
        label: 'Firebase Firestore',
        async initialize() {
          await loadFirebaseSdk();
          if (!window.firebase) throw new Error('Firebase SDK failed to load.');
          if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
          auth = firebase.auth();
          db = firebase.firestore();
          stateRef = db.doc(FIRESTORE_STATE_PATH);
          await auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
          await new Promise((resolve) => {
            const unsubscribe = auth.onAuthStateChanged(() => {
              unsubscribe();
              resolve();
            });
          });
        },
        getCurrentSession() {
          const accountId = accountIdFromEmail(auth?.currentUser?.email);
          return accountId ? sessionForAccountId(accountId) : null;
        },
        async login(accountId, password) {
          await auth.signInWithEmailAndPassword(authEmailFor(accountId), password);
          const sessionData = sessionForAccountId(accountId);
          if (!sessionData) throw new Error('This Firebase account is not mapped to a ForHome account.');
          return sessionData;
        },
        async logout() {
          if (auth?.currentUser) await auth.signOut();
        },
        async loadState(options = {}) {
          const snap = await stateRef.get();
          if (snap.exists) return snap.data();
          if (!options.seedIfMissing) {
            throw new Error('Firestore state is not initialized. Log in as admin first.');
          }
          const seeded = { ...defaultState(), version: 1, updatedAt: new Date().toISOString() };
          await stateRef.set(seeded);
          return seeded;
        },
        async saveState(next) {
          const saved = { ...next, version: Number(next.version || 0) + 1, updatedAt: new Date().toISOString() };
          await stateRef.set(saved);
          return saved;
        },
        subscribeState(onState) {
          return stateRef.onSnapshot(
            (snap) => { if (snap.exists) onState(snap.data()); },
            (err) => setStatus(`Firestore listen failed: ${err.message}`)
          );
        },
        getCurrentAccountId() {
          return accountIdFromEmail(auth?.currentUser?.email);
        }
      };
    }

    async function init() {
      storageProvider = createStorageProvider();
      state = normalizeState(defaultState());
      try {
        await storageProvider.initialize();
        $('loginServerText').textContent = `${storageProvider.label} ready`;
        setStatus('준비됨');
        session = storageProvider.getCurrentSession();
        if (session) {
          sessionStorage.setItem(SESSION_KEY, JSON.stringify(session));
          await loadState({ seedIfMissing: session.isAdmin });
          startStateSubscription();
          showApp();
        } else {
          sessionStorage.removeItem(SESSION_KEY);
          showLogin();
        }
      } catch (err) {
        $('loginServerText').textContent = '저장소 연결 실패';
        setStatus('저장소 사용 불가');
        toast(`저장소 오류: ${err.message}`);
        showLogin();
      }
    }

    async function loadState(options = {}) {
      try {
        state = normalizeState(await storageProvider.loadState(options));
        $('loginServerText').textContent = `${storageProvider.label} connected`;
        setStatus(`동기화됨 v${state.version || 0}`);
      } catch (err) {
        state = normalizeState(defaultState());
        $('loginServerText').textContent = `${storageProvider.label} unavailable`;
        setStatus('저장소 불러오기 실패');
        toast(`저장소 오류: ${err.message}`);
        throw err;
      }
    }

    async function saveState(showSaved = true) {
      saving = true;
      state.updatedAt = new Date().toISOString();
      updateVacationFlags(state);
      try {
        state = normalizeState(await storageProvider.saveState(state));
        setStatus(`동기화됨 v${state.version || 0}`);
        if (showSaved) toast('저장했습니다');
      } catch (err) {
        setStatus('저장 실패');
        toast(`저장 실패: ${err.message}`);
      } finally {
        saving = false;
      }
      render();
    }

    function startStateSubscription() {
      if (unsubscribeState) unsubscribeState();
      unsubscribeState = storageProvider.subscribeState((remoteState) => {
        if (saving || $('appShell').hidden) return;
        const active = document.activeElement;
        if (active && ['INPUT', 'TEXTAREA', 'SELECT'].includes(active.tagName)) return;
        const remote = normalizeState(remoteState);
        if ((remote.version || 0) !== (state.version || 0)) {
          state = remote;
          setStatus(`동기화됨 v${state.version || 0}`);
          render();
        }
      });
    }

    async function refreshIfChanged() {
      if (saving || $('appShell').hidden) return;
      const active = document.activeElement;
      if (active && ['INPUT', 'TEXTAREA', 'SELECT'].includes(active.tagName)) return;
      try {
        const remote = normalizeState(await storageProvider.loadState());
        if ((remote.version || 0) !== (state.version || 0)) {
          state = remote;
          setStatus(`동기화됨 v${state.version || 0}`);
          render();
        }
      } catch {
        setStatus('저장소 확인 실패');
      }
    }

    async function hardReload() {
      try {
        await loadState();
        render();
        toast('새로고침했습니다');
      } catch {}
    }

    async function doLogin() {
      const id = $('loginId').value.trim();
      const pw = $('loginPw').value;
      const acc = accountTemplate(id);
      if (!acc) {
        $('loginError').textContent = '아이디와 비밀번호를 확인해 주세요.';
        return;
      }
      $('loginButton').disabled = true;
      $('loginError').textContent = '';
      try {
        session = await storageProvider.login(id, pw);
        sessionStorage.setItem(SESSION_KEY, JSON.stringify(session));
        await loadState({ seedIfMissing: session.isAdmin });
        startStateSubscription();
        showApp();
      } catch (err) {
        $('loginError').textContent = err.message || '로그인에 실패했습니다.';
      } finally {
        $('loginButton').disabled = false;
      }
    }

    async function logout() {
      if (unsubscribeState) {
        unsubscribeState();
        unsubscribeState = null;
      }
      sessionStorage.removeItem(SESSION_KEY);
      try { await storageProvider.logout(); } catch {}
      session = null;
      state = normalizeState(defaultState());
      showLogin();
    }
    function showLogin() { $('loginScreen').hidden = false; $('appShell').hidden = true; }
    function showApp() {
      $('loginScreen').hidden = true;

    function showTab(tab) {
      activeTab = tab;

    function render() {

    function renderMemberRow(m) {
      const fatigue = weekFatigue(m.id);
      const pct = Math.min(100, Math.round(fatigue / state.settings.vacationThreshold * 100));
      const tag = m.onVacation ? '<span class="tag amber">Rest</span>' : `<span class="tag teal">${fatigue}</span>`;
      return `<div class="member-row"><div class="avatar" style="background:${softColor(m.color)}">${escapeHtml(m.emoji)}</div><div class="grow"><div class="name-line"><strong>${escapeHtml(m.name)}</strong>${tag}</div><div class="progress"><span style="width:${pct}%;background:${pct >= 90 ? 'var(--red)' : 'var(--teal)'}"></span></div></div></div>`;
    }
    function renderRankRow(m, rank, weekly) {
      return `<div class="rank-row"><span class="tag ${rank === 1 ? 'amber' : 'blue'}">${rank}</span><div class="avatar" style="background:${softColor(m.color)}">${escapeHtml(m.emoji)}</div><div class="grow"><div class="name-line"><strong>${escapeHtml(m.name)}</strong><span class="tag teal">${xpFor(m, weekly)}XP</span></div><div class="mini">${countFor(m, weekly)} tasks</div></div></div>`;

    function renderMessage(msg) {
      const from = member(msg.fromId);

    function renderMemberSelect(m) {
      const disabled = !canActAs(m);
      return `<button class="select-card ${selectedMemberId === m.id ? 'active' : ''} ${disabled ? 'disabled' : ''}" ${disabled ? 'disabled' : ''} onclick="selectMember('${m.id}')"><div class="avatar" style="background:${softColor(m.color)}">${escapeHtml(m.emoji)}</div><div><strong>${escapeHtml(m.name)}</strong><div class="mini">${m.restricted ? '본인/관리자' : '공동 기록'}</div></div></button>`;

    }

    function renderDay(d, currentMonth) {
      const key = dateKey(d.getTime());
      const entries = entriesByDate(key);
      const classes = ['day'];
      if (d.getMonth() !== currentMonth) classes.push('out');
      if (key === dateKey(Date.now())) classes.push('today');
      if (key === selectedDate) classes.push('active');
      return `<button class="${classes.join(' ')}" onclick="selectDate('${key}')"><strong>${d.getDate()}</strong><div class="dot-row">${entries.slice(0, 8).map(() => '<span class="dot"></span>').join('')}</div></button>`;
    }

    function selectDate(key) { selectedDate = key; renderCalendar(); }
    function selectBadgeMember(id) { badgeMemberId = id; renderBadges(); }

    async function sendMessage() {
      const text = $('messageText').value.trim();
      if (!text) return toast('메시지를 입력해 주세요');

      const fromId = acc?.memberId || 'admin';
      state.messages.push({ id: `msg${Date.now()}`, fromId, toId: $('messageTo').value || null, text, timestamp: Date.now() });

    async function saveSettings() {
      state.settings.vacationThreshold = clamp(Number($('vacationThreshold').value || 25), 5, 100);
      state.settings.weekStartsOn = Number($('weekStartsOn').value);
      await saveState();

    async function addMember() {
      const name = $('memberName').value.trim();
      if (!name) return toast('이름을 입력해 주세요');
      const id = `m${Date.now()}`;
      state.members.push(memberSeed(id, name, $('memberEmoji').value.trim() || 'U', $('memberRestricted').value === 'true', randomColor()));

    async function removeMember(id) {
      if (!confirm('가족을 삭제할까요?')) return;
      state.members = state.members.filter(m => m.id !== id);
      state.history = state.history.filter(h => h.memberId !== id);
      state.messages = state.messages.filter(m => m.fromId !== id && m.toId !== id);
      state.accounts = state.accounts.map(a => a.memberId === id ? { ...a, memberId: null, isAdmin: true } : a);
      await saveState();
    }
    async function addChore() {
      const name = $('choreName').value.trim();
      if (!name) return toast('집안일 이름을 입력해 주세요');
      const fatigue = clamp(Number($('choreFatigue').value || 2), 1, 10);
      state.chores.push(choreSeed(`c${Date.now()}`, name, $('choreEmoji').value.trim() || 'OK', fatigue, $('choreCategory').value));
      await saveState();
    }
    async function removeChore(id) {
      if (!confirm('집안일을 삭제할까요?')) return;
      state.chores = state.chores.filter(c => c.id !== id);
      if (selectedChoreId === id) selectedChoreId = null;
      await saveState();
    }
    async function addAccount() {
      const id = $('accountId').value.trim();
      const pw = $('accountPw').value.trim();
      const memberId = $('accountMember').value || null;
      if (!id || !pw) return toast('아이디와 비밀번호를 입력해 주세요');
      if (state.accounts.some(a => a.id === id)) return toast('이미 있는 계정입니다');
      state.accounts.push({ id, password: pw, memberId, isAdmin: !memberId });

    }
    async function removeAccount(id) {
      if (id === session.accountId) return toast('현재 로그인한 계정은 삭제할 수 없습니다');
      if (!confirm('계정을 삭제할까요?')) return;
      state.accounts = state.accounts.filter(a => a.id !== id);
      await saveState();
    }
    async function resetWeek() {
      if (!confirm('이번 주 기록을 삭제할까요?')) return;
      const ws = weekStartTs();
      state.history = state.history.filter(h => Number(h.timestamp) < ws);
      state.badgeHistory = state.badgeHistory.filter(h => Number(h.timestamp) < ws);
      applyMemberTotals();
      await saveState();
    }
    async function resetAll() {
      if (!confirm('전체 앱 데이터를 초기화할까요?')) return;
      state = defaultState();
      await saveState(false);
      await logout();
    }
    async function exportDailySummary() {
      const summary = buildDailySummary();
      localStorage.setItem('forhome-last-daily-summary', JSON.stringify(summary));
      toast('오늘 요약을 준비했습니다');
    }

    function messageOptions() { return `<option value="">전체</option>${state.members.map(m => `<option value="${m.id}">${escapeHtml(m.emoji)} ${escapeHtml(m.name)}</option>`).join('')}`; }
    function firstAllowedMember() { return state.members.find(canActAs); }
    function canActAs(m) {
      if (!m || !session) return false;
      if (session.isAdmin) return true;
      if (session.memberId === m.id) return true;
      return !m.restricted;
    }
    function account(id) { return state.accounts.find(a => a.id === id); }
    function member(id) { return state.members.find(m => m.id === id); }
    function chore(id) { return state.chores.find(c => c.id === id); }
    function countFor(m, h) { return m ? h.filter(x => x.memberId === m.id).length : 0; }
    function xpFor(m, h) { return m ? h.filter(x => x.memberId === m.id).reduce((s, x) => s + Number(x.xpEarned || 0), 0) : 0; }
    function fatigueFor(m, h) { return m ? h.filter(x => x.memberId === m.id).reduce((s, x) => s + Number(x.fatigueAdded || 0), 0) : 0; }
    function weekFatigue(memberId) { return weekHistory().filter(x => x.memberId === memberId).reduce((s, x) => s + Number(x.fatigueAdded || 0), 0); }
    function weekHistory() { const ws = weekStartTs(); return state.history.filter(h => Number(h.timestamp) >= ws); }
    function weekStartTs() { return weekStartTsFor(state); }
    function weekStartTsFor(target) {
      const d = new Date();
      d.setHours(0, 0, 0, 0);
      const startsOn = Number(target.settings?.weekStartsOn ?? 1);
      const diff = (d.getDay() - startsOn + 7) % 7;
      d.setDate(d.getDate() - diff);
      return d.getTime();
    }
    function entriesByDate(key) { return state.history.filter(h => dateKey(h.timestamp) === key).sort((a, b) => a.timestamp - b.timestamp); }
    function startOfDay(ts) { const d = new Date(ts); d.setHours(0, 0, 0, 0); return d.getTime(); }
    function dateKey(ts) { const d = new Date(ts); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`; }
    function formatClock(ts) { return new Date(Number(ts)).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }); }
    function formatTime(ts) { return `${dateKey(ts)} ${formatClock(ts)}`; }
    function readJson(text) { try { return JSON.parse(text); } catch { return null; } }
    function escapeHtml(value) { return String(value ?? '').replace(/[&<>"']/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch])); }
    function clamp(n, min, max) { return Math.max(min, Math.min(max, Number.isFinite(n) ? n : min)); }
    function softColor(color = '#2563eb') { return `${color}18`; }
    function randomColor() { return ['#2563eb', '#0f9f8f', '#f59e0b', '#ef4444', '#7c3aed', '#0891b2'][Math.floor(Math.random() * 6)]; }
    function setStatus(text) { $('syncStatus').textContent = `${text} / ${storageProvider?.label || '시작 중'}`; }
    function toast(text) {
      const el = $('toast');
      el.textContent = text;
      el.classList.add('show');
      clearTimeout(el.timer);
      el.timer = setTimeout(() => el.classList.remove('show'), 2400);
    }
    function showSuccess(emoji, title, message) {
      $('successEmoji').textContent = emoji;
      $('successTitle').textContent = title;
      $('successMessage').textContent = message;
      $('successOverlay').hidden = false;
    }

    let currentProof = null;
    let currentProofPromise = null;
    const REVIEW_STATUS = {
      pending: { label: '확인 대기', className: 'amber' },
      approved: { label: '확인됨', className: 'teal' },
      rejected: { label: '다시 확인', className: 'red' }
    };

    function normalizeState(next) {
      const base = defaultState();
      const merged = { ...base, ...(next || {}) };
      merged.settings = { ...base.settings, ...(next?.settings || {}) };
      merged.members = Array.isArray(next?.members) ? next.members.map(m => ({ ...memberSeed(m.id, m.name, m.emoji, !!m.restricted, m.color || '#2563eb'), ...m })) : base.members;
      merged.chores = Array.isArray(next?.chores) ? next.chores.map(c => ({ ...c, xp: Number(c.xp || c.fatigue * 10) })) : base.chores;
      merged.accounts = Array.isArray(next?.accounts) && next.accounts.length ? next.accounts : base.accounts;
      merged.history = Array.isArray(next?.history) ? next.history.map(normalizeHistoryEntry) : [];
      merged.messages = Array.isArray(next?.messages) ? next.messages : [];
      merged.tomorrowPlans = Array.isArray(next?.tomorrowPlans) ? next.tomorrowPlans.map(normalizePlan) : [];
      merged.badgeHistory = Array.isArray(next?.badgeHistory) ? next.badgeHistory : [];
      updateVacationFlags(merged);
      return merged;
    }

    function normalizeHistoryEntry(entry) {
      const status = entry.verificationStatus || (entry.reviewedAt ? 'approved' : 'approved');
      return {
        reviewerId: null,
        reviewedBy: null,
        reviewedAt: null,
        reviewNote: '',
        proofImage: '',
        proofImageName: '',
        proofCaption: '',
        proofAnalysis: '',
        ...entry,
        verificationStatus: status
      };
    }

    function normalizePlan(plan) {
      return { status: 'open', note: '', createdAt: Date.now(), ...plan };
    }

    async function handleProofSelected(event) {
      const file = event.target.files?.[0];
      currentProof = null;
      currentProofPromise = null;
      const preview = $('proofPreview');
      const status = $('proofStatus');
      if (!file) {
        preview.hidden = true;
        status.textContent = '사진 없음';
        return;
      }
      status.textContent = '사진 확인 중';
      currentProofPromise = readProofImage(file).then((proof) => {
        currentProof = proof;
        preview.src = proof.dataUrl;
        preview.hidden = false;
        status.textContent = proof.analysis;
        return proof;
      }).catch((err) => {
        status.textContent = `사진 처리 실패: ${err.message}`;
        return null;
      });
      await currentProofPromise;
    }

    function readProofImage(file) {
      return new Promise((resolve, reject) => {
        if (!file.type.startsWith('image/')) {
          reject(new Error('이미지 파일만 등록할 수 있습니다'));
          return;
        }
        const reader = new FileReader();
        reader.onload = () => {
          const img = new Image();
          img.onload = () => {
            const max = 720;
            const scale = Math.min(1, max / Math.max(img.width, img.height));
            const canvas = document.createElement('canvas');
            canvas.width = Math.max(1, Math.round(img.width * scale));
            canvas.height = Math.max(1, Math.round(img.height * scale));
            canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
            const dataUrl = canvas.toDataURL('image/jpeg', .62);
            const kb = Math.round(file.size / 1024);
            resolve({ dataUrl, name: file.name, analysis: `사진 ${canvas.width}x${canvas.height}, 원본 ${kb}KB, ${file.name}` });
          };
          img.onerror = () => reject(new Error('사진을 읽을 수 없습니다'));
          img.src = reader.result;
        };
        reader.onerror = () => reject(new Error('파일을 읽을 수 없습니다'));
        reader.readAsDataURL(file);
      });
    }

    async function completeTask() {

      const c = chore(selectedChoreId);
      if (!m || !c || !canActAs(m)) return;
      if (currentProofPromise) await currentProofPromise;
      const reviewerId = $('reviewerId')?.value || reviewableMembers(m.id)[0]?.id || null;
      const caption = $('proofCaption')?.value.trim() || '';
      const entry = {
        id: `h${Date.now()}`,
        memberId: m.id,
        choreId: c.id,
        choreName: c.name,
        choreEmoji: c.emoji,
        category: c.category,
        fatigueAdded: Number(c.fatigue),
        xpEarned: Number(c.xp),
        timestamp: Date.now(),
        verificationStatus: 'pending',
        reviewerId,
        reviewedBy: null,
        reviewedAt: null,
        reviewNote: '',
        proofImage: currentProof?.dataUrl || '',
        proofImageName: currentProof?.name || '',
        proofCaption: caption,
        proofAnalysis: currentProof?.analysis || (caption ? '메모만 등록됨' : '사진/메모 없음')

      state.messages.push({ id: `msg${Date.now()}`, fromId: m.id, toId: reviewerId, text: `${m.name}님이 ${c.name} 완료 확인을 요청했습니다.`, timestamp: Date.now() });

    function applyMemberTotals() {
      state.members.forEach(m => {
        const approved = state.history.filter(h => h.memberId === m.id && h.verificationStatus === 'approved');
        m.completedTasks = approved.length;
        m.totalFatigue = approved.reduce((s, h) => s + Number(h.fatigueAdded || 0), 0);
        m.xp = approved.reduce((s, h) => s + Number(h.xpEarned || 0), 0);
        m.stickers = approved.length;
      });

    function grantBadges(m) {
      if (!m) return [];
      if (!Array.isArray(m.earnedBadges)) m.earnedBadges = [];
      const weekly = weekHistory().filter(h => h.verificationStatus === 'approved');
      const created = [];
      BADGES.forEach(b => {
        if (!m.earnedBadges.includes(b.id) && b.cond(m, weekly)) {
          m.earnedBadges.push(b.id);
          state.badgeHistory.push({ id: `b${Date.now()}${b.id}`, memberId: m.id, badgeId: b.id, name: b.name, emoji: b.emoji || '', timestamp: Date.now() });
          created.push(b);
        }
      });
      return created;
    }

    function buildDailySummary() {
      const tasks = todayHistory().map(h => ({ memberName: member(h.memberId)?.name || h.memberId, choreName: h.choreName, status: statusMeta(h.verificationStatus).label, reviewer: member(h.reviewerId)?.name || '', time: formatClock(h.timestamp) }));
      const tomorrow = tomorrowPlansFor(tomorrowDateKey()).map(p => ({ to: member(p.toId)?.name || p.toId, title: p.title, note: p.note }));
      return { date: dateKey(Date.now()), tasks, tomorrow };
    }

    function updateVacationFlags(target) {
      const limit = Number(target.settings?.vacationThreshold || 25);
      const weekStart = weekStartTsFor(target);
      target.members?.forEach(m => {
        m.onVacation = target.history.filter(h => h.memberId === m.id && h.verificationStatus === 'approved' && Number(h.timestamp) >= weekStart).reduce((sum, h) => sum + Number(h.fatigueAdded || 0), 0) >= limit;
      });
    }

    function currentMemberId() { return session?.memberId || null; }
    function canReviewEntry(entry) { return !!session && (session.isAdmin || (entry.reviewerId === session.memberId && entry.memberId !== session.memberId)); }
    function reviewableMembers(memberId) { return state.members.filter(m => m.id !== memberId); }
    function pendingReviews() { return state.history.filter(h => h.verificationStatus === 'pending' && (!session || session.isAdmin || h.reviewerId === session.memberId)).sort((a, b) => b.timestamp - a.timestamp); }
    function todayHistory() { const key = dateKey(Date.now()); return state.history.filter(h => dateKey(h.timestamp) === key).sort((a, b) => b.timestamp - a.timestamp); }
    function tomorrowDateKey() { const d = new Date(); d.setDate(d.getDate() + 1); return dateKey(d.getTime()); }
    function tomorrowPlansFor(key) { return state.tomorrowPlans.filter(p => p.targetDate === key).sort((a, b) => Number(a.createdAt || 0) - Number(b.createdAt || 0)); }
    function statusMeta(status) { return REVIEW_STATUS[status] || REVIEW_STATUS.pending; }
    function workRanking(items) {
      const map = new Map();
      items.forEach(item => {
        const current = map.get(item.memberId) || { member: member(item.memberId), count: 0, load: 0, items: [] };
        current.count += 1;
        current.load += Number(item.fatigueAdded || 0);
        current.items.push(item);
        map.set(item.memberId, current);
      });
      return [...map.values()].sort((a, b) => b.load - a.load || b.count - a.count);
    }
  </script>

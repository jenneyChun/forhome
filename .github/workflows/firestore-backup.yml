name: Firestore daily backup

on:
  schedule:
    - cron: '10 15 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    env:
      FIREBASE_PROJECT_ID: forhome-19317
      FIRESTORE_FAMILY_ID: forhome
      FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install production dependencies
        run: npm install --omit=dev

      - name: Write Firestore backup
        run: node scripts/firestore-backup.js

      - name: Commit backup files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/backups reports/daily
          if git diff --cached --quiet; then
            echo "No backup changes to commit."
          else
            git commit -m "chore: add Firestore daily backup"
            git push
          fi

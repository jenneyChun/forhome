<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우리 집 히어로 🏠</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;}

/* LOGIN */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.login-box{background:white;border-radius:28px;padding:32px 24px;max-width:380px;width:100%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.2);}
.login-logo{font-size:52px;margin-bottom:10px;}
.login-title{font-size:22px;font-weight:bold;margin-bottom:4px;}
.login-sub{font-size:12px;color:#aaa;margin-bottom:24px;}
.login-input{width:100%;padding:12px 16px;border:2px solid #eee;border-radius:12px;font-size:15px;margin-bottom:10px;outline:none;transition:border-color .2s;font-family:inherit;}
.login-input:focus{border-color:#667eea;}
.login-err{color:#e74c3c;font-size:12px;min-height:18px;margin-bottom:6px;}
.btn-login{width:100%;padding:14px;border:none;border-radius:14px;background:linear-gradient(135deg,#667eea,#764ba2);color:white;font-size:16px;font-weight:bold;cursor:pointer;transition:opacity .2s;}
.btn-login:hover{opacity:.9;}
.login-hint{margin-top:16px;font-size:11px;color:#bbb;line-height:1.6;}

/* APP */
.app{max-width:480px;margin:0 auto;background:#f0f2ff;min-height:100vh;display:flex;flex-direction:column;}
.header{background:linear-gradient(135deg,#667eea,#764ba2);color:white;padding:13px 16px 11px;display:flex;align-items:center;justify-content:space-between;}
.header h1{font-size:17px;font-weight:bold;}
.header-user{display:flex;align-items:center;gap:6px;font-size:12px;background:rgba(255,255,255,.2);padding:5px 10px;border-radius:20px;cursor:pointer;}
.nav{background:white;display:flex;border-bottom:2px solid #eef;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.08);}
.nav-btn{flex:1;padding:9px 4px 8px;border:none;background:none;cursor:pointer;font-size:10px;color:#aaa;display:flex;flex-direction:column;align-items:center;gap:2px;transition:all .2s;}
.nav-btn .ic{font-size:17px;}
.nav-btn.active{color:#667eea;}
.nav-btn.active .ic{transform:scale(1.15);}
.content{flex:1;padding:14px;overflow-y:auto;padding-bottom:24px;}
.sec{display:none;}.sec.active{display:block;}

/* CARDS */
.card{background:white;border-radius:16px;padding:14px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.card-title{font-size:14px;font-weight:bold;color:#444;margin-bottom:10px;display:flex;align-items:center;gap:6px;}

/* MEMBER ROW */
.member-row{display:flex;align-items:center;gap:10px;padding:9px;background:white;border-radius:12px;margin-bottom:7px;box-shadow:0 1px 5px rgba(0,0,0,.05);cursor:pointer;transition:transform .15s;}
.member-row:hover{transform:translateY(-1px);}
.avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.fatigue-bar{height:5px;background:#eee;border-radius:3px;margin-top:5px;overflow:hidden;}
.fatigue-fill{height:100%;border-radius:3px;transition:width .4s;}

/* CHORE ITEMS */
.chore-item{display:flex;align-items:center;gap:9px;padding:10px;background:#f8f9ff;border-radius:12px;margin-bottom:7px;cursor:pointer;transition:all .2s;border:2px solid transparent;}
.chore-item:hover{border-color:#667eea;background:#eef3ff;}
.chore-item.sel{border-color:#667eea;background:#eef3ff;}
.chore-item.disabled-item{opacity:.35;cursor:not-allowed;pointer-events:none;}
.badge-fat{background:#ff6b6b;color:white;padding:2px 7px;border-radius:9px;font-size:11px;font-weight:bold;}
.badge-xp{background:#ffd93d;color:#333;padding:2px 7px;border-radius:9px;font-size:11px;font-weight:bold;}

/* CATEGORY TABS */
.cat-tabs{display:flex;gap:7px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px;}
.cat-tab{flex-shrink:0;padding:6px 14px;border:2px solid #eee;border-radius:20px;font-size:12px;font-weight:bold;cursor:pointer;background:white;color:#888;transition:all .2s;}
.cat-tab.active{border-color:#667eea;background:#667eea;color:white;}

/* RANKINGS */
.rank-item{display:flex;align-items:center;gap:10px;padding:10px;background:white;border-radius:12px;margin-bottom:7px;}

/* BADGES */
.badge-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;}
.bdg{text-align:center;padding:10px;background:white;border-radius:12px;box-shadow:0 1px 5px rgba(0,0,0,.05);}
.bdg.locked{opacity:.28;}

/* XP BAR */
.xp-bar{height:6px;background:#eee;border-radius:3px;overflow:hidden;margin-top:3px;}
.xp-fill{height:100%;background:linear-gradient(90deg,#ffd93d,#ff6b6b);border-radius:3px;transition:width .5s;}

/* INPUTS */
input,select,textarea{width:100%;padding:10px 12px;border:2px solid #eee;border-radius:12px;font-size:14px;margin-bottom:8px;outline:none;transition:border-color .2s;background:white;font-family:inherit;}
input:focus,select:focus,textarea:focus{border-color:#667eea;}
textarea{resize:vertical;min-height:70px;}

/* BUTTONS */
.btn{border:none;border-radius:12px;padding:11px 18px;cursor:pointer;font-size:14px;font-weight:bold;transition:all .18s;}
.btn-primary{background:linear-gradient(135deg,#667eea,#764ba2);color:white;width:100%;margin-top:6px;}
.btn-primary:active{opacity:.85;}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:8px;}
.btn-red{background:#fdedec;color:#e74c3c;}
.btn-gray{background:linear-gradient(135deg,#b2bec3,#636e72);color:white;width:100%;margin-top:6px;}

/* EMOJI GRID */
.emoji-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;max-height:130px;overflow-y:auto;margin-bottom:8px;}
.emoji-btn{font-size:20px;padding:4px;border:2px solid transparent;border-radius:8px;cursor:pointer;background:none;transition:all .15s;}
.emoji-btn:hover,.emoji-btn.sel{border-color:#667eea;background:#eef;}

/* MESSAGES */
.msg-bubble{background:#f0f2ff;border-radius:12px;padding:10px 12px;margin-bottom:8px;}
.msg-bubble.to-me{background:#eef3ff;border-left:3px solid #667eea;}
.msg-bubble.from-me{background:#f0fff4;border-left:3px solid #56ab2f;}
.msg-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.msg-sender{font-size:12px;font-weight:bold;color:#555;}
.msg-time{font-size:10px;color:#aaa;}
.msg-text{font-size:14px;color:#333;}
.msg-to{font-size:11px;color:#888;margin-top:3px;}

/* VACATION */
.vac-alert{background:linear-gradient(135deg,#ffeaa7,#fdcb6e);border-radius:12px;padding:10px;margin-bottom:8px;display:flex;align-items:center;gap:10px;}

/* SETTINGS LIST */
.settings-row{display:flex;align-items:center;gap:10px;padding:10px;background:#f8f9ff;border-radius:12px;margin-bottom:7px;}
.chore-btn{display:flex;align-items:center;gap:10px;padding:11px 14px;background:#f8f9ff;border:2px solid transparent;border-radius:12px;margin-bottom:7px;cursor:pointer;text-align:left;width:100%;transition:all .2s;}
.chore-btn:hover{border-color:#667eea;background:#eef3ff;}
.tag-restricted{background:#fdedec;color:#e74c3c;padding:2px 7px;border-radius:8px;font-size:10px;font-weight:bold;}
.tag-free{background:#d4efdf;color:#27ae60;padding:2px 7px;border-radius:8px;font-size:10px;font-weight:bold;}
.tag-admin{background:#f4ecff;color:#8e44ad;padding:2px 7px;border-radius:8px;font-size:10px;font-weight:bold;}

/* OVERLAYS */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px;}
.overlay.hidden{display:none;}
.popup{background:white;border-radius:22px;padding:22px;max-width:340px;width:100%;text-align:center;}
.popup-emoji{font-size:56px;animation:float 2s ease-in-out infinite;}
.popup-title{font-size:19px;font-weight:bold;margin:8px 0;}
.popup-msg{color:#666;font-size:13px;line-height:1.5;margin-bottom:10px;}

/* STAT BOX */
.stat-box{padding:8px;border-radius:10px;text-align:center;}
.stat-lbl{font-size:10px;color:#777;}
.stat-val{font-size:17px;font-weight:bold;margin-top:1px;}

/* MISC */
.divider{height:1px;background:#f0f0f0;margin:10px 0;}
.empty-msg{color:#999;font-size:13px;text-align:center;padding:16px;}
.activity-item{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid #f0f0f0;font-size:12px;}
.activity-item:last-child{border-bottom:none;}
.back-btn{display:flex;align-items:center;gap:6px;color:#667eea;font-size:14px;font-weight:bold;cursor:pointer;margin-bottom:14px;border:none;background:none;padding:0;}

/* ANIMATIONS */
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}
@keyframes confettiFall{0%{transform:translateY(-60px) rotate(0);opacity:1;}100%{transform:translateY(105vh) rotate(720deg);opacity:0;}}
.confetti-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;overflow:hidden;}
.confetti-piece{position:absolute;border-radius:2px;animation:confettiFall linear forwards;}
</style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">🏠</div>
    <div class="login-title">우리 집 히어로</div>
    <div class="login-sub">가족만의 공간에 오신 걸 환영해요</div>
    <input class="login-input" type="text" id="loginId" placeholder="아이디" autocomplete="username">
    <input class="login-input" type="password" id="loginPw" placeholder="비밀번호" autocomplete="current-password"
           onkeydown="if(event.key==='Enter')doLogin()">
    <div class="login-err" id="loginErr"></div>
    <button class="btn-login" onclick="doLogin()">로그인 →</button>
    <div class="login-hint">
      엄마: mom / mom1234 &nbsp;|&nbsp; 아빠: dad / dad1234<br>
      관리자: admin / admin1234
    </div>
  </div>
</div>

<!-- ══ MAIN APP ══ -->
<div class="app" id="mainApp" style="display:none;">
  <div class="header">
    <h1>🏠 우리 집 히어로</h1>
    <div style="display:flex;align-items:center;gap:6px;">
      <button id="syncBtn" onclick="syncFromGitHub()" style="background:rgba(255,255,255,.2);border:none;border-radius:20px;color:white;padding:5px 10px;font-size:13px;cursor:pointer;" title="최신 데이터 가져오기">🔄</button>
      <div class="header-user" onclick="confirmLogout()" id="headerUser"></div>
    </div>
  </div>
  <nav class="nav">
    <button class="nav-btn active" onclick="showTab('home')"><span class="ic">🏠</span>홈</button>
    <button class="nav-btn" onclick="showTab('tasks')"><span class="ic">✅</span>할 일</button>
    <button class="nav-btn" onclick="showTab('rankings')"><span class="ic">🏆</span>순위</button>
    <button class="nav-btn" onclick="showTab('badges')"><span class="ic">🌟</span>뱃지</button>
    <button class="nav-btn" onclick="showTab('settings')"><span class="ic">⚙️</span>설정</button>
  </nav>
  <div class="content">

    <!-- HOME -->
    <div class="sec active" id="sec-home">
      <div class="card" id="balanceCard"></div>
      <div class="card" id="msgCard">
        <div class="card-title">💬 가족 메시지</div>
        <select id="msgTo" style="margin-bottom:8px;"></select>
        <textarea id="msgText" placeholder="가족에게 하고 싶은 말을 남겨보세요 ✏️"></textarea>
        <button class="btn btn-primary" onclick="sendMessage()" style="margin-top:0;">메시지 보내기 💌</button>
        <div class="divider"></div>
        <div id="msgFeed"></div>
      </div>
      <div class="card">
        <div class="card-title">📜 최근 활동</div>
        <div id="activityFeed"></div>
      </div>
    </div>

    <!-- 할 일 -->
    <div class="sec" id="sec-tasks">
      <div class="card">
        <div class="card-title">👤 누가 했나요?</div>
        <div id="memberSelector"></div>
      </div>
      <div class="card">
        <div class="card-title">📋 무슨 일을 했나요?</div>
        <div class="cat-tabs" id="catTabs"></div>
        <div id="choreSelector"></div>
        <button class="btn btn-primary" onclick="completeTask()">완료! ✅</button>
      </div>
    </div>

    <!-- RANKINGS -->
    <div class="sec" id="sec-rankings">
      <div style="display:flex;gap:8px;margin-bottom:12px;">
        <button class="btn btn-sm" id="weekBtn" onclick="setRankPeriod('week')" style="flex:1;background:#667eea;color:white;">이번 주</button>
        <button class="btn btn-sm" id="allBtn" onclick="setRankPeriod('all')" style="flex:1;background:#eee;color:#333;">전체 기록</button>
      </div>
      <div id="rankingList"></div>
      <div class="card" id="praiseCard"></div>
    </div>

    <!-- BADGES -->
    <div class="sec" id="sec-badges">
      <div id="badgeMemberTabs" style="display:flex;gap:7px;overflow-x:auto;margin-bottom:12px;padding-bottom:4px;"></div>
      <div id="badgeDisplay"></div>
    </div>

    <!-- SETTINGS (동적 렌더링) -->
    <div class="sec" id="sec-settings">
      <div id="settingsContent"></div>
    </div>

  </div>
</div>

<!-- SUCCESS POPUP -->
<div class="overlay hidden" id="successOverlay" onclick="closePopup()">
  <div class="popup" onclick="event.stopPropagation()">
    <div class="popup-emoji" id="popupEmoji">🎉</div>
    <div class="popup-title" id="popupTitle">잘했어요!</div>
    <div class="popup-msg" id="popupMsg"></div>
    <div id="popupSticker" style="font-size:26px;margin:6px 0;"></div>
    <div id="popupBadge" style="font-size:13px;color:#667eea;margin-bottom:8px;font-weight:bold;"></div>
    <button class="btn btn-primary" onclick="closePopup()" style="margin-top:0;">고마워요! 😊</button>
  </div>
</div>

<!-- MEMBER DETAIL POPUP -->
<div class="overlay hidden" id="memberOverlay" onclick="closeMemberPopup()">
  <div class="popup" onclick="event.stopPropagation()">
    <div id="memberDetailContent"></div>
    <button class="btn btn-primary" onclick="closeMemberPopup()" style="margin-top:4px;">닫기</button>
  </div>
</div>

<script>
// ★ GitHub 설정 — GH_TOKEN을 실제 Personal Access Token으로 교체하세요
//   토큰 발급: GitHub → Settings → Developer settings → Personal access tokens → Fine-grained tokens
//   권한: Contents (Read and Write), 대상 저장소: cejingme/forhome

function loadFromLocal(){
  try{
    const d = localStorage.getItem('houseHeroV3');
    if(d){
      const p = JSON.parse(d);
      S.accounts  = p.accounts  || initAccounts();
      S.members   = p.members   || initMembers();
      S.chores    = p.chores    || [...DEFAULT_CHORES];
      S.history   = p.history   || [];
      S.messages  = p.messages  || [];
      S.settings  = p.settings  || {vacationThreshold:25};
      S.loggedIn  = p.loggedIn  || null;
    } else {
      S.accounts = initAccounts();
      S.members  = initMembers();
    }
  } catch(e) {
    S.accounts = initAccounts();
    S.members  = initMembers();
  }
  applyMigration();
}

function applyMigration(){
  S.members.forEach(m => {
    if(m.id==='jerry' && m.name.includes('블루')) m.name = '제리';
    if(m.id==='tori'  && m.name.includes('시니')) m.name = '또리';
  });
}

function ghHeaders(){
  return {
    'Authorization': `token ${GH_TOKEN}`,
    'Accept': 'application/vnd.github.v3+json',
    'Content-Type': 'application/json',
  };
}
function toBase64(str){ return btoa(unescape(encodeURIComponent(str))); }
function fromBase64(str){ return decodeURIComponent(escape(atob(str.replace(/\n/g,'')))); }

async function loadFromGitHub(){
  // 로그인 세션은 이 기기의 localStorage에서 먼저 복원
  try{
    const local = JSON.parse(localStorage.getItem('houseHeroV3')||'{}');
    S.loggedIn = local.loggedIn || null;
  }catch(e){}

  try{
    const res = await fetch(GH_API_URL, {headers: ghHeaders()});
    if(res.status === 404){
      // 첫 실행 — 기본값으로 GitHub에 파일 생성
      S.accounts = initAccounts();
      S.members  = initMembers();
      S.chores   = [...DEFAULT_CHORES];
      await persist();
      return;
    }
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    ghFileSha = json.sha;
    const p = JSON.parse(fromBase64(json.content));
    S.accounts = p.accounts || initAccounts();
    S.members  = p.members  || initMembers();
    S.chores   = p.chores   || [...DEFAULT_CHORES];
    S.history  = p.history  || [];
    S.messages = p.messages || [];
    S.settings = p.settings || {vacationThreshold:25};
    applyMigration();
    localStorage.setItem('houseHeroV3', JSON.stringify({...p, loggedIn:S.loggedIn}));
  }catch(e){
    console.warn('GitHub 로드 실패, localStorage 사용:', e.message);
    loadFromLocal();
  }
}

function initAccounts(){ return DEFAULT_ACCOUNTS.map(a=>({...a})); }
function initMembers(){
  return FIXED_MEMBERS.map(m=>({
    ...m, xp:0, totalFatigue:0, completedTasks:0, stickers:0, onVacation:false, earnedBadges:[],
  }));
}

async function persist(){
  // loggedIn은 기기별 세션이므로 GitHub에는 저장하지 않음
  const data = {
    accounts:S.accounts, members:S.members, chores:S.chores,
    history:S.history, messages:S.messages, settings:S.settings,
  };
  localStorage.setItem('houseHeroV3', JSON.stringify({...data, loggedIn:S.loggedIn}));
  try{
    const body = {
      message: '데이터 업데이트',
      content: toBase64(JSON.stringify(data)),
    };
    if(ghFileSha) body.sha = ghFileSha;
    const res = await fetch(GH_API_URL, {method:'PUT', headers:ghHeaders(), body:JSON.stringify(body)});
    if(res.status === 409){
      // SHA 충돌 — 최신 SHA 다시 받아서 재시도
      const cur = await fetch(GH_API_URL, {headers:ghHeaders()});
      if(cur.ok){ ghFileSha = (await cur.json()).sha; body.sha = ghFileSha; }
      await fetch(GH_API_URL, {method:'PUT', headers:ghHeaders(), body:JSON.stringify(body)});
    } else if(res.ok){
      ghFileSha = (await res.json()).content.sha;
    }
  }catch(e){
    console.warn('GitHub 저장 실패:', e.message);
  }
}

function refreshCurrentTab(){

const member   = id => S.members.find(m=>m.id===id);
const account  = id => S.accounts.find(a=>a.id===id);
const color    = i  => COLORS[i%COLORS.length];
const level    = xp => Math.min(5, Math.floor(xp/100));
const levelTitle = xp => TITLES[level(xp)];
const xpPct    = xp => { const l=level(xp); return l>=5?100:((xp-l*100)/100)*100; };

function weekStart(){
  const d=new Date(); d.setHours(0,0,0,0); d.setDate(d.getDate()-d.getDay()); return d.getTime();
}
function wFatigue(id){ return S.history.filter(h=>h.memberId===id&&h.timestamp>=weekStart()).reduce((s,h)=>s+h.fatigueAdded,0); }
function wTasks(id)  { return S.history.filter(h=>h.memberId===id&&h.timestamp>=weekStart()).length; }
function maxWF()     { return Math.max(1,...S.members.filter(m=>m.restricted).map(m=>wFatigue(m.id))); }
function fatColor(f,max){ const r=max>0?f/max:0; return r>.7?'#e74c3c':r>.4?'#f39c12':'#27ae60'; }
function timeAgo(ts){
  const d=Date.now()-ts;
  if(d<60000)   return '방금';
  if(d<3600000) return Math.floor(d/60000)+'분 전';
  if(d<86400000)return Math.floor(d/3600000)+'시간 전';
  return Math.floor(d/86400000)+'일 전';
}

// 현재 로그인 사용자가 해당 멤버의 작업 기록 가능 여부
function canRecord(targetMemberId){
  if(!S.loggedIn) return false;
  if(S.loggedIn.isAdmin) return true;
  const target = member(targetMemberId);
  if(target && !target.restricted) return true; // 비제한 멤버(아들 등)는 누구나 기록 가능
  return S.loggedIn.memberId === targetMemberId;
}

function requireAdmin(){
  if(S.loggedIn?.isAdmin) return true;
  alert('관리자만 이 작업을 수행할 수 있어요. 👑');
  return false;
}

// 누가 했나요? 에 표시할 멤버 (로그인한 사람 + 아들)
function getTaskDoers(){
  if(!S.loggedIn) return [];
  const son = S.members.find(m=>m.id==='son');
  if(S.loggedIn.isAdmin){
    const restricted = S.members.filter(m=>m.restricted);
    return son ? [...restricted, son] : restricted;
  }
  const me = S.members.find(m=>m.id===S.loggedIn.memberId);
  const result = me ? [me] : [];
  if(son) result.push(son);
  return result;
}

function checkVacation(){
  const doers = S.members.filter(m=>m.restricted);
  if(doers.length<2){ doers.forEach(m=>m.onVacation=false); return; }
  const fs = doers.map(m=>wFatigue(m.id));
  const avg = fs.reduce((a,b)=>a+b,0)/fs.length;
  doers.forEach((m,i)=>{ m.onVacation = fs[i]>S.settings.vacationThreshold && fs[i]>avg*1.4; });
}

function checkBadges(m){
  if(!m.earnedBadges) m.earnedBadges=[];
  const newOnes=[];
  BADGES.forEach(b=>{ if(!m.earnedBadges.includes(b.id)&&b.cond(m,S.history)){ m.earnedBadges.push(b.id); newOnes.push(b); } });
  return newOnes;
}

function escHtml(str){ return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function selChore(id) { S.selChoreId=id;  renderTasks(); }

function completeTask(){
  if(!S.selMemberId){ alert('누가 했는지 선택해주세요!'); return; }
  if(!S.selChoreId) { alert('어떤 일인지 선택해주세요!'); return; }
  if(!canRecord(S.selMemberId)){ alert('이 가족의 기록은 본인 계정으로만 추가할 수 있어요! 🔒'); return; }
  const m=member(S.selMemberId), c=S.chores.find(x=>x.id===S.selChoreId);
  if(!m||!c) return;
  m.xp+=c.xp; m.totalFatigue+=c.fatigue; m.completedTasks+=1; m.stickers+=1;
  S.history.push({id:'h'+Date.now(), memberId:m.id, choreId:c.id, timestamp:Date.now(), xpEarned:c.xp, fatigueAdded:c.fatigue});
  const newBadges=checkBadges(m);
  checkVacation();
  persist();
  const praise=PRAISES[Math.floor(Math.random()*PRAISES.length)];
  const sticker='⭐'.repeat(Math.min((m.stickers-1)%5+1,5));
  const badgeMsg=newBadges.length?'🏅 새 뱃지: '+newBadges.map(b=>b.emoji+b.name).join(', ')+'!':'';
  showPopup(m.emoji, `${m.name}, 최고예요! 🎉`, praise, sticker, badgeMsg);
  confetti();
  S.selMemberId=null; S.selChoreId=null;
}

function renderRankings(){
  const list=document.getElementById('rankingList'), praise=document.getElementById('praiseCard');
  const doers=S.members.filter(m=>m.restricted);
  if(!doers.length){ list.innerHTML='<div class="card empty-msg">가족을 추가하면 순위가 표시돼요!</div>'; praise.innerHTML=''; return; }
  const sorted=[...doers].sort((a,b)=>S.rankPeriod==='week'?wFatigue(b.id)-wFatigue(a.id):b.totalFatigue-a.totalFatigue);
  const RE=['🥇','🥈','🥉','4️⃣','5️⃣'];
  const RC=['#ffd700','#c0c0c0','#cd7f32','#ddd','#ddd'];
  const RB=['#fff9e6','#f8f8f8','#fff4ec','#f9f9f9'];
  list.innerHTML=sorted.map((m,i)=>{
    const f=S.rankPeriod==='week'?wFatigue(m.id):m.totalFatigue;
    const t=S.rankPeriod==='week'?wTasks(m.id):m.completedTasks;
    return`<div class="rank-item" style="background:${RB[i]||'#f9f9f9'};">
      <div style="width:30px;height:30px;border-radius:50%;background:${RC[i]||'#eee'};display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;">${RE[i]||i+1}</div>
      <div style="font-size:20px;">${m.emoji}</div>
      <div style="flex:1;"><div style="font-weight:bold;font-size:14px;">${m.name}</div><div style="font-size:11px;color:#888;">${t}개 완료 · 피로도 ${f}</div></div>
      <div style="text-align:right;"><div style="font-size:17px;font-weight:bold;color:#667eea;">${m.xp}XP</div><div style="font-size:11px;color:#aaa;">⭐${m.stickers}</div></div>
    </div>`;
  }).join('');
  if(sorted.length){
    const top=sorted[0], tf=S.rankPeriod==='week'?wFatigue(top.id):top.totalFatigue;
    praise.innerHTML=`<div style="text-align:center;padding:6px;">
      <div style="font-size:38px;animation:float 2s ease-in-out infinite;">${top.emoji}</div>
      <div style="font-size:16px;font-weight:bold;margin:7px 0;">${top.name}님이 이번 주 히어로! 🦸</div>
      <div style="color:#666;font-size:12px;">피로도 ${tf}점 · ${top.completedTasks}개 완료</div>
      <div style="margin-top:8px;color:#888;font-size:13px;font-style:italic;">"${PRAISES[Math.floor(Math.random()*PRAISES.length)]}"</div>
    </div>`;
  }
}

function setRankPeriod(p){
  S.rankPeriod=p;
  document.getElementById('weekBtn').style.cssText=`flex:1;background:${p==='week'?'#667eea':'#eee'};color:${p==='week'?'white':'#333'};`;
  document.getElementById('allBtn').style.cssText=`flex:1;background:${p==='all'?'#667eea':'#eee'};color:${p==='all'?'white':'#333'};`;
  renderRankings();
}

//  BADGES
// ═══════════════════════════════════════
function renderBadges(){
  const tabs=document.getElementById('badgeMemberTabs'), disp=document.getElementById('badgeDisplay');
  if(!S.loggedIn) return;
  const showMembers = S.loggedIn.isAdmin ? S.members : S.members.filter(m=>m.restricted);
  if(!showMembers.length){ tabs.innerHTML=''; disp.innerHTML='<div class="card empty-msg">뱃지를 볼 가족이 없어요!</div>'; return; }
  if(!S.selBadgeMember) S.selBadgeMember=showMembers[0].id;
  tabs.innerHTML=showMembers.map(m=>`
    <button class="btn btn-sm" onclick="selBadgeMember('${m.id}')"
      style="flex-shrink:0;background:${S.selBadgeMember===m.id?'#667eea':'#eee'};color:${S.selBadgeMember===m.id?'white':'#333'};">
      ${m.emoji} ${m.name}
    </button>`).join('');
  const m=member(S.selBadgeMember);
  if(!m) return;
  const earned=m.earnedBadges||[];
  const stars='⭐'.repeat(Math.min(m.stickers,20))+(m.stickers>20?`<div style="font-size:13px;margin-top:4px;">+${m.stickers-20}개 더!</div>`:'');
  disp.innerHTML=`
    <div class="card">
      <div class="card-title">🏅 ${m.emoji} ${m.name}의 뱃지 (${earned.length}/${BADGES.length})</div>
      <div class="badge-grid">${BADGES.map(b=>{
        const has=earned.includes(b.id);
        return`<div class="bdg${has?'':' locked'}">
          <div style="font-size:26px;">${b.emoji}</div>
          <div style="font-size:11px;font-weight:bold;margin-top:4px;">${b.name}</div>
          <div style="font-size:10px;color:#999;margin-top:2px;">${has?'✅ 획득!':b.desc}</div>
        </div>`;
      }).join('')}</div>
    </div>
    <div class="card">
      <div class="card-title">⭐ 칭찬 스티커 (${m.stickers}개)</div>
      <div style="text-align:center;font-size:24px;line-height:1.7;">${stars}</div>
      <div style="text-align:center;color:#888;font-size:13px;margin-top:6px;">총 ${m.stickers}개 🎉</div>
    </div>`;
}

function selBadgeMember(id){ S.selBadgeMember=id; renderBadges(); }

function selChoreDetailEmoji(e){
  S.selChoreEmoji=e;
  document.querySelectorAll('#choreDetailEmojiGrid .emoji-btn').forEach(b=>b.classList.toggle('sel',b.textContent===e));
}

function saveChoreDetail(id){
  if(!requireAdmin()) return;
  const c=S.chores.find(x=>x.id===id);
  if(!c) return;
  c.emoji    = S.selChoreEmoji;
  c.name     = document.getElementById('choreDetailName').value.trim()||c.name;
  c.category = document.getElementById('choreDetailCategory').value;
  c.fatigue  = parseInt(document.getElementById('choreDetailFatigue').value);
  c.xp       = c.fatigue*10;
  persist();
  alert('저장됐어요! ✅');
  goSettingsMain();
}

// ═══════════════════════════════════════
//  SETTINGS ACTIONS
// ═══════════════════════════════════════
function selMemEmoji(e){ S.selMemberEmoji=e; renderSettings(); }
function selChoreEmoji(e){ S.selChoreEmoji=e; renderSettings(); }

function addChore(){
  if(!requireAdmin()) return;
  const name=document.getElementById('newChoreName')?.value.trim();
  const fatigue=parseInt(document.getElementById('newChoreFatigue')?.value||'2');
  const category=document.getElementById('newChoreCategory')?.value||'house';
  if(!name){ alert('이름을 입력해주세요!'); return; }
  S.chores.push({id:'cu'+Date.now(), name, emoji:S.selChoreEmoji, fatigue, xp:fatigue*10, category});
  S.selChoreEmoji='🍽️';
  persist(); renderSettings();
}

function removeChore(id){
  if(!requireAdmin()) return;
  if(!confirm('이 항목을 삭제할까요?')) return;
  S.chores=S.chores.filter(c=>c.id!==id);
  if(S.selChoreId===id) S.selChoreId=null;
  persist(); goSettingsMain();
}

function addMember(){
  if(!requireAdmin()) return;
  const name=document.getElementById('newMemberName')?.value.trim();
  if(!name){ alert('이름을 입력해주세요!'); return; }
  if(S.members.length>=10){ alert('최대 10명까지 추가할 수 있어요!'); return; }
  const restricted=document.getElementById('newMemberRestricted')?.checked||false;
  S.members.push({id:'m'+Date.now(), name, emoji:S.selMemberEmoji, restricted,
    xp:0, totalFatigue:0, completedTasks:0, stickers:0, onVacation:false, earnedBadges:[]});
  S.selMemberEmoji='👩';
  persist(); renderSettings();
}

function removeMember(id){
  if(!requireAdmin()) return;
  const m=member(id); if(!m) return;
  if(!confirm(`${m.emoji} ${m.name}을 삭제할까요?`)) return;
  S.members=S.members.filter(x=>x.id!==id);
  S.history=S.history.filter(x=>x.memberId!==id);
  persist(); renderSettings();
}

function addAccount(){
  if(!requireAdmin()) return;
  const id=document.getElementById('newAccId')?.value.trim();
  const pw=document.getElementById('newAccPw')?.value.trim();
  const memberId=document.getElementById('newAccMember')?.value||null;
  if(!id||!pw){ alert('아이디와 비밀번호를 입력해주세요!'); return; }
  if(S.accounts.find(a=>a.id===id)){ alert('이미 있는 아이디예요!'); return; }
  S.accounts.push({id, password:pw, memberId:memberId||null, isAdmin:false});
  persist(); renderSettings();
}

function removeAccount(id){
  if(!requireAdmin()) return;
  if(!confirm(`계정 "${id}"를 삭제할까요?`)) return;
  S.accounts=S.accounts.filter(a=>a.id!==id);
  persist(); renderSettings();
}

function changePassword(accId){
  if(!requireAdmin()) return;
  const newPw=prompt(`"${accId}" 계정의 새 비밀번호를 입력하세요:`);
  if(!newPw||!newPw.trim()){ return; }
  const acc=account(accId);
  if(acc){ acc.password=newPw.trim(); persist(); alert('비밀번호가 변경됐어요! ✅'); renderSettings(); }
}

function saveSettings(){
  if(!requireAdmin()) return;
  const val=parseInt(document.getElementById('vacThreshold')?.value||'25');
  if(val>=5&&val<=100){ S.settings.vacationThreshold=val; persist(); alert('저장됐어요! ✅'); }
  else alert('5~100 사이의 값을 입력해주세요.');
}

function resetWeek(){
  if(!requireAdmin()) return;
  if(!confirm('이번 주 피로도를 초기화할까요?')) return;
  const ws=weekStart();
  S.history=S.history.filter(h=>h.timestamp<ws);
  persist(); renderSettings();
}

function resetAll(){
  if(!requireAdmin()) return;
  if(!confirm('⚠️ 모든 데이터를 초기화할까요?')) return;
  if(!confirm('정말로요? 되돌릴 수 없어요!')) return;
  localStorage.removeItem('houseHeroV3');
  location.reload();
}

//  MESSAGES
// ═══════════════════════════════════════
function sendMessage(){
  const text=document.getElementById('msgText').value.trim();
  if(!text){ alert('메시지를 입력해주세요!'); return; }
  const toId=document.getElementById('msgTo').value||null;
  const fromId = S.loggedIn?.isAdmin ? 'admin' : (S.loggedIn?.memberId||'unknown');
  S.messages.push({id:'msg'+Date.now(), fromId, toId, text, timestamp:Date.now()});
  document.getElementById('msgText').value='';
  persist(); renderMsgFeed();
}

      <div class="stat-box" style="background:#fdedec;"><div class="stat-lbl">💦 총 피로</div><div class="stat-val">${m.totalFatigue}</div></div>
      <div class="stat-box" style="background:#d4efdf;"><div class="stat-lbl">💪 이번 주</div><div class="stat-val">${wf}</div></div>
    </div>
    <div style="text-align:left;margin-bottom:9px;">
      <div style="font-size:11px;color:#888;">XP ${m.xp}</div>
      <div class="xp-bar"><div class="xp-fill" style="width:${xp}%;"></div></div>
    </div>
    <div style="font-size:12px;color:#555;text-align:left;">🏅 뱃지: ${earned.length?earned.map(bid=>BADGES.find(b=>b.id===bid)?.emoji||'').join(' '):'아직 없어요'}</div>
    ${m.onVacation?'<div style="background:#ffeaa7;padding:9px;border-radius:10px;font-size:13px;margin-top:8px;">🌴 오늘은 쉬는 날이에요! 진짜 고생했어요!</div>':''}`;
  document.getElementById('memberOverlay').classList.remove('hidden');
}
function closeMemberPopup(){ document.getElementById('memberOverlay').classList.add('hidden'); }

function showPopup(emoji,title,msg,sticker,badge){
  document.getElementById('popupEmoji').textContent=emoji;
  document.getElementById('popupTitle').textContent=title;
  document.getElementById('popupMsg').textContent=msg;
  document.getElementById('popupSticker').textContent=sticker;
  document.getElementById('popupBadge').textContent=badge||'';
  document.getElementById('successOverlay').classList.remove('hidden');
}
function closePopup(){
  document.getElementById('successOverlay').classList.add('hidden');
  renderHome();
}

function confetti(){
  const c=document.createElement('div'); c.className='confetti-container'; document.body.appendChild(c);
  const cols=['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#c77dff','#ff9a3c'];
  for(let i=0;i<50;i++){
    const p=document.createElement('div'); p.className='confetti-piece';
    p.style.left=Math.random()*100+'%';
    p.style.background=cols[Math.floor(Math.random()*cols.length)];
    p.style.animationDuration=(1.5+Math.random()*2)+'s';
    p.style.animationDelay=Math.random()*0.4+'s';
    p.style.width=(5+Math.random()*8)+'px'; p.style.height=(5+Math.random()*8)+'px';
    c.appendChild(p);
  }
  setTimeout(()=>c.remove(), 3500);
}

// ═══════════════════════════════════════
//  AUTO SYNC (오전 6시, 오후 6시)
// ═══════════════════════════════════════
function scheduleAutoSync(){
  const syncHours = [6, 18];
  const now = new Date();
  let msUntilNext = Infinity;
  for(const h of syncHours){
    const next = new Date(now);
    next.setHours(h, 0, 0, 0);
    let ms = next - now;
    if(ms <= 0) ms += 24 * 60 * 60 * 1000;
    if(ms < msUntilNext) msUntilNext = ms;
  }
  setTimeout(async () => {
    if(S.loggedIn){
      await loadFromGitHub();
      refreshCurrentTab();
    }
    scheduleAutoSync();
  }, msUntilNext);
}

// ═══════════════════════════════════════
//  INIT
// ═══════════════════════════════════════
(async () => {
  await loadFromGitHub();
  scheduleAutoSync();
  if(S.loggedIn && S.accounts.find(a=>a.id===S.loggedIn.accountId)){
    showMain();
  } else {
    S.loggedIn=null;
    document.getElementById('loginScreen').style.display='flex';
  }
})();
</script>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우리 집 히어로 🏠</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏠</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;}

/* LOGIN */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.login-box{background:white;border-radius:28px;padding:32px 24px;max-width:380px;width:100%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.2);}
.login-logo{font-size:52px;margin-bottom:10px;}
.login-title{font-size:22px;font-weight:bold;margin-bottom:4px;}
.login-sub{font-size:12px;color:#aaa;margin-bottom:24px;}
.login-input{width:100%;padding:12px 16px;border:2px solid #eee;border-radius:12px;font-size:15px;margin-bottom:10px;outline:none;transition:border-color .2s;font-family:inherit;}
.login-input:focus{border-color:#667eea;}
.login-err{color:#e74c3c;font-size:12px;min-height:18px;margin-bottom:6px;}
.btn-login{width:100%;padding:14px;border:none;border-radius:14px;background:linear-gradient(135deg,#667eea,#764ba2);color:white;font-size:16px;font-weight:bold;cursor:pointer;transition:opacity .2s;}
.btn-login:hover{opacity:.9;}

/* APP */
.app{max-width:480px;margin:0 auto;background:#f0f2ff;min-height:100vh;display:flex;flex-direction:column;}
.header{background:linear-gradient(135deg,#667eea,#764ba2);color:white;padding:13px 16px 11px;display:flex;align-items:center;justify-content:space-between;}
.header h1{font-size:17px;font-weight:bold;}
.header-user{display:flex;align-items:center;gap:6px;font-size:12px;background:rgba(255,255,255,.2);padding:5px 10px;border-radius:20px;cursor:pointer;}
.nav{background:white;display:flex;border-bottom:2px solid #eef;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.08);}
.nav-btn{flex:1;padding:9px 4px 8px;border:none;background:none;cursor:pointer;font-size:10px;color:#aaa;display:flex;flex-direction:column;align-items:center;gap:2px;transition:all .2s;}
.nav-btn .ic{font-size:17px;}
.nav-btn.active{color:#667eea;}
.nav-btn.active .ic{transform:scale(1.15);}
.content{flex:1;padding:14px;overflow-y:auto;padding-bottom:24px;}
.sec{display:none;}.sec.active{display:block;}

/* CARDS */
.card{background:white;border-radius:16px;padding:14px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.card-title{font-size:14px;font-weight:bold;color:#444;margin-bottom:10px;display:flex;align-items:center;gap:6px;}

/* MEMBER ROW */
.member-row{display:flex;align-items:center;gap:10px;padding:9px;background:white;border-radius:12px;margin-bottom:7px;box-shadow:0 1px 5px rgba(0,0,0,.05);cursor:pointer;transition:transform .15s;}
.member-row:hover{transform:translateY(-1px);}
.avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.fatigue-bar{height:5px;background:#eee;border-radius:3px;margin-top:5px;overflow:hidden;}
.fatigue-fill{height:100%;border-radius:3px;transition:width .4s;}

/* CHORE ITEMS */
.chore-item{display:flex;align-items:center;gap:9px;padding:10px;background:#f8f9ff;border-radius:12px;margin-bottom:7px;cursor:pointer;transition:all .2s;border:2px solid transparent;}
.chore-item:hover{border-color:#667eea;background:#eef3ff;}
.chore-item.sel{border-color:#667eea;background:#eef3ff;}
.chore-item.disabled-item{opacity:.35;cursor:not-allowed;pointer-events:none;}
.badge-fat{background:#ff6b6b;color:white;padding:2px 7px;border-radius:9px;font-size:11px;font-weight:bold;}
.badge-xp{background:#ffd93d;color:#333;padding:2px 7px;border-radius:9px;font-size:11px;font-weight:bold;}

/* CATEGORY TABS */
.cat-tabs{display:flex;gap:7px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px;}
.cat-tab{flex-shrink:0;padding:6px 14px;border:2px solid #eee;border-radius:20px;font-size:12px;font-weight:bold;cursor:pointer;background:white;color:#888;transition:all .2s;}
.cat-tab.active{border-color:#667eea;background:#667eea;color:white;}

/* RANKINGS */
.rank-item{display:flex;align-items:center;gap:10px;padding:10px;background:white;border-radius:12px;margin-bottom:7px;}

/* BADGES */
.badge-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;}
.bdg{text-align:center;padding:10px;background:white;border-radius:12px;box-shadow:0 1px 5px rgba(0,0,0,.05);}
.bdg.locked{opacity:.28;}

/* XP BAR */
.xp-bar{height:6px;background:#eee;border-radius:3px;overflow:hidden;margin-top:3px;}
.xp-fill{height:100%;background:linear-gradient(90deg,#ffd93d,#ff6b6b);border-radius:3px;transition:width .5s;}

/* INPUTS */
input,select,textarea{width:100%;padding:10px 12px;border:2px solid #eee;border-radius:12px;font-size:14px;margin-bottom:8px;outline:none;transition:border-color .2s;background:white;font-family:inherit;}
input:focus,select:focus,textarea:focus{border-color:#667eea;}
textarea{resize:vertical;min-height:70px;}

/* BUTTONS */
.btn{border:none;border-radius:12px;padding:11px 18px;cursor:pointer;font-size:14px;font-weight:bold;transition:all .18s;}
.btn-primary{background:linear-gradient(135deg,#667eea,#764ba2);color:white;width:100%;margin-top:6px;}
.btn-primary:active{opacity:.85;}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:8px;}
.btn-red{background:#fdedec;color:#e74c3c;}
.btn-gray{background:linear-gradient(135deg,#b2bec3,#636e72);color:white;width:100%;margin-top:6px;}

/* EMOJI GRID */
.emoji-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;max-height:130px;overflow-y:auto;margin-bottom:8px;}
.emoji-btn{font-size:20px;padding:4px;border:2px solid transparent;border-radius:8px;cursor:pointer;background:none;transition:all .15s;}
.emoji-btn:hover,.emoji-btn.sel{border-color:#667eea;background:#eef;}

/* MESSAGES */
.msg-bubble{background:#f0f2ff;border-radius:12px;padding:10px 12px;margin-bottom:8px;}
.msg-bubble.to-me{background:#eef3ff;border-left:3px solid #667eea;}
.msg-bubble.from-me{background:#f0fff4;border-left:3px solid #56ab2f;}
.msg-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.msg-sender{font-size:12px;font-weight:bold;color:#555;}
.msg-time{font-size:10px;color:#aaa;}
.msg-text{font-size:14px;color:#333;}
.msg-to{font-size:11px;color:#888;margin-top:3px;}

/* VACATION */
.vac-alert{background:linear-gradient(135deg,#ffeaa7,#fdcb6e);border-radius:12px;padding:10px;margin-bottom:8px;display:flex;align-items:center;gap:10px;}

/* SETTINGS LIST */
.settings-row{display:flex;align-items:center;gap:10px;padding:10px;background:#f8f9ff;border-radius:12px;margin-bottom:7px;}
.chore-btn{display:flex;align-items:center;gap:10px;padding:11px 14px;background:#f8f9ff;border:2px solid transparent;border-radius:12px;margin-bottom:7px;cursor:pointer;text-align:left;width:100%;transition:all .2s;}
.chore-btn:hover{border-color:#667eea;background:#eef3ff;}
.tag-restricted{background:#fdedec;color:#e74c3c;padding:2px 7px;border-radius:8px;font-size:10px;font-weight:bold;}
.tag-free{background:#d4efdf;color:#27ae60;padding:2px 7px;border-radius:8px;font-size:10px;font-weight:bold;}
.tag-admin{background:#f4ecff;color:#8e44ad;padding:2px 7px;border-radius:8px;font-size:10px;font-weight:bold;}

/* OVERLAYS */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px;}
.overlay.hidden{display:none;}
.popup{background:white;border-radius:22px;padding:22px;max-width:340px;width:100%;text-align:center;}
.popup-emoji{font-size:56px;animation:float 2s ease-in-out infinite;}
.popup-title{font-size:19px;font-weight:bold;margin:8px 0;}
.popup-msg{color:#666;font-size:13px;line-height:1.5;margin-bottom:10px;}

/* STAT BOX */
.stat-box{padding:8px;border-radius:10px;text-align:center;}
.stat-lbl{font-size:10px;color:#777;}
.stat-val{font-size:17px;font-weight:bold;margin-top:1px;}

/* MISC */
.divider{height:1px;background:#f0f0f0;margin:10px 0;}
.empty-msg{color:#999;font-size:13px;text-align:center;padding:16px;}
.activity-item{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid #f0f0f0;font-size:12px;}
.activity-item:last-child{border-bottom:none;}
.back-btn{display:flex;align-items:center;gap:6px;color:#667eea;font-size:14px;font-weight:bold;cursor:pointer;margin-bottom:14px;border:none;background:none;padding:0;}

/* CALENDAR */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-day{min-height:52px;background:#f8f9ff;border-radius:8px;padding:3px 4px;cursor:pointer;border:2px solid transparent;transition:all .15s;}
.cal-day:hover{border-color:#667eea;}
.cal-day.today{border-color:#667eea;background:#eef3ff;}
.cal-day.cal-sel{border-color:#764ba2;background:#f0ebff;}
.cal-day-num{font-size:12px;font-weight:bold;color:#444;}
.cal-day-num.today-num{color:#667eea;}

/* ANIMATIONS */
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}
@keyframes confettiFall{0%{transform:translateY(-60px) rotate(0);opacity:1;}100%{transform:translateY(105vh) rotate(720deg);opacity:0;}}
.confetti-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;overflow:hidden;}
.confetti-piece{position:absolute;border-radius:2px;animation:confettiFall linear forwards;}
</style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">🏠</div>
    <div class="login-title">우리 집 히어로</div>
    <div class="login-sub">가족만의 공간에 오신 걸 환영해요</div>
    <input class="login-input" type="text" id="loginId" placeholder="아이디" autocomplete="username">
    <input class="login-input" type="password" id="loginPw" placeholder="비밀번호" autocomplete="current-password"
           onkeydown="if(event.key==='Enter')doLogin()">
    <div class="login-err" id="loginErr"></div>
    <button class="btn-login" onclick="doLogin()">로그인 →</button>
    <div class="login-hint">
      엄마: mom / mom1234 &nbsp;|&nbsp; 아빠: dad / dad1234<br>
      아들: son / son1234 &nbsp;|&nbsp; 관리자: admin / admin1234
    </div>
  </div>
</div>

<!-- ══ MAIN APP ══ -->
<div class="app" id="mainApp" style="display:none;">
  <div class="header">
    <h1>🏠 우리 집 히어로</h1>
    <div class="header-user" onclick="confirmLogout()" id="headerUser"></div>
  </div>
  <nav class="nav">
    <button class="nav-btn active" onclick="showTab('home')"><span class="ic">🏠</span>홈</button>
    <button class="nav-btn" onclick="showTab('tasks')"><span class="ic">✅</span>할 일</button>
    <button class="nav-btn" onclick="showTab('calendar')"><span class="ic">📅</span>달력</button>
    <button class="nav-btn" onclick="showTab('badges')"><span class="ic">🌟</span>뱃지</button>
    <button class="nav-btn" onclick="showTab('settings')"><span class="ic">⚙️</span>설정</button>
  </nav>
  <div class="content">

    <!-- HOME -->
    <div class="sec active" id="sec-home">
      <div class="card" id="balanceCard"></div>
      <div class="card" id="homeRankCard"></div>
      <div class="card" id="msgCard">
        <div class="card-title">💬 가족 메시지</div>
        <select id="msgTo" style="margin-bottom:8px;"></select>
        <textarea id="msgText" placeholder="가족에게 하고 싶은 말을 남겨보세요 ✏️"></textarea>
        <button class="btn btn-primary" onclick="sendMessage()" style="margin-top:0;">메시지 보내기 💌</button>
        <div class="divider"></div>
        <div id="msgFeed"></div>
      </div>
      <div class="card">
        <div class="card-title">📜 최근 활동</div>
        <div id="activityFeed"></div>
      </div>
    </div>

    <!-- 할 일 -->
    <div class="sec" id="sec-tasks">
      <div class="card">
        <div class="card-title">👤 누가 했나요?</div>
        <div id="memberSelector"></div>
      </div>
      <div class="card">
        <div class="card-title">📋 무슨 일을 했나요?</div>
        <div class="cat-tabs" id="catTabs"></div>
        <div id="choreSelector"></div>
        <button class="btn btn-primary" onclick="completeTask()">완료! ✅</button>
      </div>
    </div>

    <!-- CALENDAR -->
    <div class="sec" id="sec-calendar">
      <div id="calendarContent"></div>
    </div>

    <!-- BADGES -->
    <div class="sec" id="sec-badges">
      <div id="badgeMemberTabs" style="display:flex;gap:7px;overflow-x:auto;margin-bottom:12px;padding-bottom:4px;"></div>
      <div id="badgeDisplay"></div>
    </div>

    <!-- SETTINGS (동적 렌더링) -->
    <div class="sec" id="sec-settings">
      <div id="settingsContent"></div>
    </div>

  </div>
</div>

<!-- SUCCESS POPUP -->
<div class="overlay hidden" id="successOverlay" onclick="closePopup()">
  <div class="popup" onclick="event.stopPropagation()">
    <div class="popup-emoji" id="popupEmoji">🎉</div>
    <div class="popup-title" id="popupTitle">잘했어요!</div>
    <div class="popup-msg" id="popupMsg"></div>
    <div id="popupSticker" style="font-size:26px;margin:6px 0;"></div>
    <div id="popupBadge" style="font-size:13px;color:#667eea;margin-bottom:8px;font-weight:bold;"></div>
    <button class="btn btn-primary" onclick="closePopup()" style="margin-top:0;">고마워요! 😊</button>
  </div>
</div>

<!-- MEMBER DETAIL POPUP -->
<div class="overlay hidden" id="memberOverlay" onclick="closeMemberPopup()">
  <div class="popup" onclick="event.stopPropagation()">
    <div id="memberDetailContent"></div>
    <button class="btn btn-primary" onclick="closeMemberPopup()" style="margin-top:4px;">닫기</button>
  </div>
</div>

let S = {
  accounts: [],
  members: [],
  chores: [...DEFAULT_CHORES],
  history: [],
  messages: [],
  settings: {vacationThreshold:25},
  loggedIn: null, // {accountId, memberId, isAdmin}
  // UI
  selMemberIds: [], // 여러 명 동시 선택 가능
  selChoreId: null,
  selCategory: 'all',
  rankPeriod: 'week',
  selBadgeMember: null,
  selMemberEmoji: '👩',
  selChoreEmoji: '🍽️',
  badgeHistory: [],
  badgeResetWeek: 0,
  settingsView: 'main', // 'main' | 'chore-list' | 'chore-detail'
  choreDetailId: null,
  choreDetailFrom: 'main',
};

function load(){
  try{
    const d = localStorage.getItem('houseHeroV3');
    if(d){
      const p = JSON.parse(d);
      S.accounts       = p.accounts       || initAccounts();
      S.members        = p.members        || initMembers();
      S.chores         = p.chores         || [...DEFAULT_CHORES];
      S.history        = p.history        || [];
      S.messages       = p.messages       || [];
      S.settings       = p.settings       || {vacationThreshold:25};
      S.loggedIn       = p.loggedIn       || null;
      S.badgeHistory   = p.badgeHistory   || [];
      S.badgeResetWeek = p.badgeResetWeek || 0;
    } else {
      S.accounts = initAccounts();
      S.members  = initMembers();
    }
  } catch(e) {
    S.accounts = initAccounts();
    S.members  = initMembers();
  }
  // name migration
  S.members.forEach(m => {
    if(m.id==='jerry' && m.name.includes('블루')) m.name = '제리';
    if(m.id==='tori'  && m.name.includes('시니')) m.name = '또리';
  });
  // chore migration: add any new default chores not yet in saved data
  DEFAULT_CHORES.forEach(dc=>{ if(!S.chores.find(c=>c.id===dc.id)) S.chores.push(dc); });
  // account migration: add son account if missing
  DEFAULT_ACCOUNTS.forEach(da=>{ if(!S.accounts.find(a=>a.id===da.id)) S.accounts.push({...da}); });
}

function initAccounts(){ return DEFAULT_ACCOUNTS.map(a=>({...a})); }
function initMembers(){
  return FIXED_MEMBERS.map(m=>({
    ...m, xp:0, totalFatigue:0, completedTasks:0, stickers:0, onVacation:false, earnedBadges:[],
  }));
}

function persist(){
  try{
    localStorage.setItem('houseHeroV3', JSON.stringify({
      accounts:S.accounts, members:S.members, chores:S.chores,
      history:S.history, messages:S.messages, settings:S.settings,
      loggedIn:S.loggedIn, badgeHistory:S.badgeHistory, badgeResetWeek:S.badgeResetWeek,
    }));
  }catch(e){}
}

// ═══════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════
const member   = id => S.members.find(m=>m.id===id);
const account  = id => S.accounts.find(a=>a.id===id);
const color    = i  => COLORS[i%COLORS.length];
const level    = xp => Math.min(5, Math.floor(xp/100));
const levelTitle = xp => TITLES[level(xp)];
const xpPct    = xp => { const l=level(xp); return l>=5?100:((xp-l*100)/100)*100; };

function weekStart(){
  const d=new Date(); d.setHours(0,0,0,0); d.setDate(d.getDate()-d.getDay()); return d.getTime();
}
function wFatigue(id){ return S.history.filter(h=>h.memberId===id&&h.timestamp>=weekStart()).reduce((s,h)=>s+h.fatigueAdded,0); }
function wTasks(id)  { return S.history.filter(h=>h.memberId===id&&h.timestamp>=weekStart()).length; }
function maxWF()     { return Math.max(1,...S.members.filter(m=>m.restricted).map(m=>wFatigue(m.id))); }
function fatColor(f,max){ const r=max>0?f/max:0; return r>.7?'#e74c3c':r>.4?'#f39c12':'#27ae60'; }
function timeAgo(ts){
  const d=Date.now()-ts;
  if(d<60000)   return '방금';
  if(d<3600000) return Math.floor(d/60000)+'분 전';
  if(d<86400000)return Math.floor(d/3600000)+'시간 전';
  return Math.floor(d/86400000)+'일 전';
}

// 현재 로그인 사용자가 해당 멤버의 작업 기록 가능 여부
function canRecord(targetMemberId){
  if(!S.loggedIn) return false;
  if(S.loggedIn.isAdmin) return true;
  const target = member(targetMemberId);
  if(target && !target.restricted) return true; // 비제한 멤버(아들 등)는 누구나 기록 가능
  return S.loggedIn.memberId === targetMemberId;
}

function requireAdmin(){
  if(S.loggedIn?.isAdmin) return true;
  alert('관리자만 이 작업을 수행할 수 있어요. 👑');
  return false;
}

// 누가 했나요? 에 표시할 멤버 (로그인한 사람 + 아들)
function getTaskDoers(){
  if(!S.loggedIn) return [];
  const son = S.members.find(m=>m.id==='son');
  if(S.loggedIn.isAdmin){
    const restricted = S.members.filter(m=>m.restricted);
    return son ? [...restricted, son] : restricted;
  }
  const me = S.members.find(m=>m.id===S.loggedIn.memberId);
  const result = me ? [me] : [];
  if(son && son.id !== S.loggedIn.memberId) result.push(son);
  return result;
}

function checkVacation(){
  const doers = S.members.filter(m=>m.restricted);
  if(doers.length<2){ doers.forEach(m=>m.onVacation=false); return; }
  const fs = doers.map(m=>wFatigue(m.id));
  const avg = fs.reduce((a,b)=>a+b,0)/fs.length;
  doers.forEach((m,i)=>{ m.onVacation = fs[i]>S.settings.vacationThreshold && fs[i]>avg*1.4; });
}

function resetBadgesIfNewWeek(){
  const ws=weekStart();
  if(ws>S.badgeResetWeek){
    S.members.forEach(m=>{ m.earnedBadges=[]; });
    S.badgeResetWeek=ws;
  }
}

function checkBadges(m){
  resetBadgesIfNewWeek();
  if(!m.earnedBadges) m.earnedBadges=[];
  const wh=S.history.filter(h=>h.timestamp>=weekStart());
  const newOnes=[];
  BADGES.forEach(b=>{
    if(!m.earnedBadges.includes(b.id)&&b.cond(m,wh)){
      m.earnedBadges.push(b.id);
      newOnes.push(b);
      S.badgeHistory.push({memberId:m.id,badgeId:b.id,emoji:b.emoji,name:b.name,timestamp:Date.now()});
    }
  });
  return newOnes;
}

function escHtml(str){ return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function doLogin(){
  const id = document.getElementById('loginId').value.trim();
  const pw = document.getElementById('loginPw').value;
  const errEl = document.getElementById('loginErr');

  const acc = S.accounts.find(a=>a.id===id && a.password===pw);
  if(!acc){
    errEl.textContent = '아이디 또는 비밀번호가 맞지 않아요 😢';
    document.getElementById('loginPw').value='';
    return;
  }
  errEl.textContent='';
  S.loggedIn = {accountId:acc.id, memberId:acc.memberId, isAdmin:acc.isAdmin};
  persist();
  showMain();
}

function showMain(){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('mainApp').style.display='flex';
  const me = S.loggedIn;
  let label = me.isAdmin ? '👑 관리자' : (member(me.memberId)?.emoji||'') + ' ' + (member(me.memberId)?.name||me.accountId);
  document.getElementById('headerUser').innerHTML = label + ' <span style="font-size:10px;opacity:.7;">로그아웃</span>';
  document.getElementById('vacThreshold')?.value && (document.getElementById('vacThreshold').value=S.settings.vacationThreshold);
  checkVacation();
  showTab('home');
}

function confirmLogout(){
  if(!confirm('로그아웃 할까요?')) return;
  S.loggedIn=null;
  persist();
  document.getElementById('mainApp').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('loginId').value='';
  document.getElementById('loginPw').value='';
  document.getElementById('loginErr').textContent='';
}

// ═══════════════════════════════════════
//  TAB ROUTING
// ═══════════════════════════════════════
function showTab(tab){
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('sec-'+tab).classList.add('active');
  const tabs=['home','tasks','calendar','badges','settings'];
  document.querySelectorAll('.nav-btn')[tabs.indexOf(tab)]?.classList.add('active');
  if(tab==='home')     renderHome();
  if(tab==='tasks')    renderTasks();
  if(tab==='calendar') renderCalendar();
  if(tab==='badges')   renderBadges();
  if(tab==='settings'){ S.settingsView='main'; renderSettings(); }
}

function renderBalance(){
  const card=document.getElementById('balanceCard');
  checkVacation();
  const maxF=maxWF();
  const doers=S.members.filter(m=>m.restricted);
  let html='<div class="card-title">👨‍👩‍👧 이번 주 피로도 현황</div>';
  doers.filter(m=>m.onVacation).forEach(m=>{
    html+=`<div class="vac-alert"><span style="font-size:20px;">🌴</span><div><b>${m.emoji} ${m.name}, 오늘은 쉬어요!</b><div style="font-size:11px;color:#7f6000;">이번 주 많이 고생했어요! 💪</div></div></div>`;
  });
  if(!doers.length){ html+='<p class="empty-msg">설정에서 가족을 추가해주세요!</p>'; card.innerHTML=html; return; }
  doers.forEach((m,i)=>{
    const wf=wFatigue(m.id),wt=wTasks(m.id),c=color(i),fc=fatColor(wf,maxF),fr=maxF>0?wf/maxF*100:0;
    html+=`<div class="member-row" onclick="showMemberDetail('${m.id}')">
      <div class="avatar" style="background:${c}20;">${m.emoji}</div>
      <div style="flex:1;">
        <div style="font-weight:bold;font-size:14px;">${m.name}${m.onVacation?' 🌴':''}</div>
        <div style="font-size:11px;color:#888;">이번 주 ${wt}개 완료 · 피로도 ${wf}</div>
        <div class="fatigue-bar"><div class="fatigue-fill" style="width:${fr}%;background:${fc};"></div></div>
      </div>
      <div style="text-align:right;font-size:11px;">
        <div style="color:${fc};font-weight:bold;font-size:13px;">💦${wf}</div>
        <div style="color:#aaa;">⭐${m.stickers}</div>
      </div>
    </div>`;
  });
  card.innerHTML=html;
}

function renderMsgFeed(){
  const sel=document.getElementById('msgTo');
  sel.innerHTML=`<option value="">📢 전체 가족에게</option>`
    +S.members.map(m=>`<option value="${m.id}">${m.emoji} ${m.name}에게</option>`).join('');
  const feed=document.getElementById('msgFeed');
  const msgs=[...S.messages].reverse().slice(0,12);
  if(!msgs.length){ feed.innerHTML='<p class="empty-msg">아직 메시지가 없어요. 첫 메시지를 남겨보세요! 💌</p>'; return; }
  feed.innerHTML=msgs.map(msg=>{
    const from=member(msg.fromId)||{emoji:'👑',name:'관리자'};
    const to=msg.toId?member(msg.toId):null;
    const isFromMe=msg.fromId===S.loggedIn?.memberId || (msg.fromId==='admin'&&S.loggedIn?.isAdmin);
    const isToMe=msg.toId===S.loggedIn?.memberId;
    return`<div class="msg-bubble${isFromMe?' from-me':isToMe?' to-me':''}">
      <div class="msg-header">
        <span class="msg-sender">${from.emoji} ${from.name}</span>
        <span class="msg-time">${timeAgo(msg.timestamp)}</span>
      </div>
      <div class="msg-text">${escHtml(msg.text)}</div>
      <div class="msg-to">→ ${to?to.emoji+' '+to.name+'에게':'📢 전체에게'}</div>
    </div>`;
  }).join('');
}

function renderActivity(){
  const feed=document.getElementById('activityFeed');
  const recent=[...S.history].reverse().slice(0,8);
  if(!recent.length){ feed.innerHTML='<p class="empty-msg">아직 기록이 없어요. 첫 번째 일을 완료해보세요! 🌟</p>'; return; }
  feed.innerHTML=recent.map(h=>{
    const m=member(h.memberId),c=S.chores.find(x=>x.id===h.choreId);
    if(!m||!c) return '';
    return`<div class="activity-item">
      <span style="font-size:17px;">${c.emoji}</span>
      <div style="flex:1;"><b>${m.emoji} ${m.name}</b>이 <span style="color:#667eea;">${c.name}</span> 완료! <span style="background:#ffd93d;color:#333;padding:1px 5px;border-radius:7px;font-size:10px;">+${h.xpEarned}XP</span></div>
      <div style="font-size:10px;color:#aaa;flex-shrink:0;">${timeAgo(h.timestamp)}</div>
    </div>`;
  }).join('');
}

let homeShowAllHistory = false;

function renderHomeRank(){
  const card = document.getElementById('homeRankCard');
  const doers = S.members.filter(m=>m.restricted);
  if(!doers.length){ card.innerHTML=''; return; }
  const RE=['🥇','🥈','🥉'], RC=['#ffd700','#c0c0c0','#cd7f32'], RB=['#fff9e6','#f8f8f8','#fff4ec'];
  const sorted = [...doers].sort((a,b)=>wFatigue(b.id)-wFatigue(a.id));
  const rankHtml = sorted.map((m,i)=>{
    const wf=wFatigue(m.id), wt=wTasks(m.id);
    return`<div class="rank-item" style="background:${RB[i]||'#f9f9f9'};padding:8px 10px;">
      <div style="width:26px;height:26px;border-radius:50%;background:${RC[i]||'#eee'};display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;">${RE[i]||i+1}</div>
      <div style="font-size:18px;">${m.emoji}</div>
      <div style="flex:1;"><div style="font-weight:bold;font-size:13px;">${m.name}</div><div style="font-size:11px;color:#888;">${wt}개 완료 · 피로도 ${wf}</div></div>
      <div style="font-size:15px;font-weight:bold;color:#667eea;">${m.xp}XP</div>
    </div>`;
  }).join('');

  let historyHtml='';
  if(homeShowAllHistory){
    const all=[...S.history].reverse();
    if(!all.length){ historyHtml='<p class="empty-msg">기록이 없어요.</p>'; }
    else {
      historyHtml=all.map(h=>{
        const m=member(h.memberId), c=S.chores.find(x=>x.id===h.choreId);
        if(!m||!c) return '';
        const d=new Date(h.timestamp);
        const ds=`${d.getMonth()+1}/${d.getDate()} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
        return`<div class="activity-item">
          <span style="font-size:16px;">${c.emoji}</span>
          <div style="flex:1;"><b>${m.emoji} ${m.name}</b> · <span style="color:#667eea;">${c.name}</span></div>
          <div style="font-size:10px;color:#aaa;text-align:right;">${ds}<br><span style="background:#ffd93d;color:#333;padding:1px 4px;border-radius:6px;font-size:9px;">+${h.xpEarned}XP</span></div>
        </div>`;
      }).join('');
    }
  }

  card.innerHTML=`
    <div class="card-title">🏆 이번 주 순위</div>
    ${rankHtml}
    <div style="margin-top:8px;border-top:1px solid #eee;padding-top:8px;">
      <button class="btn btn-sm" onclick="toggleHomeHistory()" style="width:100%;background:#f0f2ff;color:#667eea;font-weight:bold;">
        ${homeShowAllHistory?'▲ 전체 기록 접기':'▼ 전체 기록 보기'}
      </button>
    </div>
    ${homeShowAllHistory?`<div style="margin-top:8px;max-height:320px;overflow-y:auto;">${historyHtml}</div>`:''}
  `;
}

function toggleHomeHistory(){ homeShowAllHistory=!homeShowAllHistory; renderHomeRank(); }

function renderTasks(){
  // 로그인한 사람 자동 선택 (아직 아무도 선택 안 됐을 때)
  if(!S.selMemberIds.length && S.loggedIn?.memberId) S.selMemberIds = [S.loggedIn.memberId];
  // 아들 계정이면 자녀 카테고리 자동 선택
  if(S.loggedIn?.memberId==='son' && S.selCategory==='all') S.selCategory='child';
  // 멤버 선택 (로그인한 사람 + 아들) — 여러 명 동시 선택 가능
  const doers = getTaskDoers();
  const mSel=document.getElementById('memberSelector');
  if(!doers.length){
    mSel.innerHTML='<p class="empty-msg">현재 계정으로는 선택 가능한 가족이 없어요.</p>';
  } else {
    mSel.innerHTML=`<div style="font-size:11px;color:#888;margin-bottom:6px;">여러 명 동시 선택 가능해요 👆</div>`+doers.map(m=>`
      <div class="chore-item${S.selMemberIds.includes(m.id)?' sel':''}" onclick="selMember('${m.id}')">
        <span style="font-size:20px;">${m.emoji}</span>
        <span style="font-weight:bold;flex:1;">${m.name}</span>
        ${m.onVacation?'<span style="background:#ffeaa7;color:#7f6000;padding:2px 7px;border-radius:8px;font-size:10px;">🌴 휴가 중</span>':''}
        ${S.selMemberIds.includes(m.id)?'<span style="color:#667eea;font-size:16px;">✓</span>':`<span style="font-size:11px;color:#aaa;">⭐${m.stickers}</span>`}
      </div>`).join('');
  }

  // 카테고리 탭
  const catTabs=document.getElementById('catTabs');
  catTabs.innerHTML=Object.entries(CATEGORIES).map(([k,v])=>
    `<div class="cat-tab${S.selCategory===k?' active':''}" onclick="selCategory('${k}')">${v}</div>`
  ).join('');

  // 집안일 목록 (카테고리 필터)
  const filtered = S.selCategory==='all' ? S.chores : S.chores.filter(c=>c.category===S.selCategory);
  document.getElementById('choreSelector').innerHTML=filtered.map(c=>`
    <div class="chore-item${S.selChoreId===c.id?' sel':''}" onclick="selChore('${c.id}')">
      <span style="font-size:19px;">${c.emoji}</span>
      <span style="font-weight:bold;flex:1;">${c.name}</span>

function selMember(id){
  if(S.selMemberIds.includes(id)){
    // 이미 선택된 경우: 다른 사람이 선택된 상태면 해제, 혼자면 유지
    if(S.selMemberIds.length>1) S.selMemberIds=S.selMemberIds.filter(x=>x!==id);
  } else {
    S.selMemberIds.push(id);
  }
  renderTasks();
}
function selChore(id) { S.selChoreId=id;  renderTasks(); }
function selCategory(cat){ S.selCategory=cat; renderTasks(); }

function completeTask(){
  if(!S.selMemberIds.length){ alert('누가 했는지 선택해주세요!'); return; }
  if(!S.selChoreId) { alert('어떤 일인지 선택해주세요!'); return; }
  // 권한 체크: 선택된 모든 멤버 기록 가능한지 확인
  for(const mid of S.selMemberIds){
    if(!canRecord(mid)){ alert('이 가족의 기록은 본인 계정으로만 추가할 수 있어요! 🔒'); return; }
  }
  const c=S.chores.find(x=>x.id===S.selChoreId);
  if(!c) return;
  const allNewBadges=[];
  const names=[];
  const emojis=[];
  S.selMemberIds.forEach(mid=>{
    const m=member(mid);
    if(!m) return;
    m.xp+=c.xp; m.totalFatigue+=c.fatigue; m.completedTasks+=1; m.stickers+=1;
    S.history.push({id:'h'+Date.now()+'_'+mid, memberId:m.id, choreId:c.id, timestamp:Date.now(), xpEarned:c.xp, fatigueAdded:c.fatigue});
    const newBadges=checkBadges(m);
    allNewBadges.push(...newBadges);
    names.push(m.name);
    emojis.push(m.emoji);
  });
  checkVacation();
  persist();
  const praise=PRAISES[Math.floor(Math.random()*PRAISES.length)];
  const nameStr=names.join(' & ');
  const emojiStr=emojis.join('');
  const badgeMsg=allNewBadges.length?'🏅 새 뱃지: '+allNewBadges.map(b=>b.emoji+b.name).join(', ')+'!':'';
  showPopup(emojiStr, `${nameStr}, 최고예요! 🎉`, praise, '⭐'.repeat(names.length), badgeMsg);
  confetti();
  S.selMemberIds=[]; S.selChoreId=null;
}

//  CALENDAR
// ═══════════════════════════════════════
let calYear=new Date().getFullYear(), calMonth=new Date().getMonth(), calSelDate=null;
const MONTH_NAMES=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const DAY_NAMES=['일','월','화','수','목','금','토'];

function renderCalendar(){
  const el=document.getElementById('calendarContent');
  const firstDay=new Date(calYear,calMonth,1);
  const lastDay=new Date(calYear,calMonth+1,0);
  const startDow=firstDay.getDay();
  const today=new Date();
  const todayKey=`${today.getFullYear()}-${today.getMonth()}-${today.getDate()}`;

  // 날짜별 기록 맵 (집안일 + 뱃지)
  const dayMap={};
  S.history.forEach(h=>{
    const d=new Date(h.timestamp);
    const key=`${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
    if(!dayMap[key]) dayMap[key]={tasks:[],badges:[]};
    dayMap[key].tasks.push(h);
  });
  S.badgeHistory.forEach(b=>{
    const d=new Date(b.timestamp);
    const key=`${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
    if(!dayMap[key]) dayMap[key]={tasks:[],badges:[]};
    dayMap[key].badges.push(b);
  });

  // 요일 헤더
  let cells=DAY_NAMES.map(d=>`<div style="text-align:center;font-size:11px;font-weight:bold;color:#888;padding:3px 0;">${d}</div>`).join('');

  // 빈 칸 (월 시작 전)
  for(let i=0;i<startDow;i++) cells+='<div></div>';

  // 날짜 셀
  for(let d=1;d<=lastDay.getDate();d++){
    const key=`${calYear}-${calMonth}-${d}`;
    const dayData=dayMap[key]||{tasks:[],badges:[]};
    const isToday=key===todayKey;
    const isSel=calSelDate===key;
    const emojis=[...new Set(dayData.tasks.map(h=>member(h.memberId)?.emoji||''))].filter(Boolean).slice(0,3).join('');
    const badgeEmojis=dayData.badges.map(b=>b.emoji).slice(0,2).join('');
    cells+=`<div class="cal-day${isToday?' today':''}${isSel?' cal-sel':''}" onclick="calSelectDay('${key}')">
      <div class="cal-day-num${isToday?' today-num':''}">${d}</div>
      ${emojis?`<div style="font-size:10px;line-height:1.3;">${emojis}</div>`:''}
      ${dayData.tasks.length?`<div style="font-size:9px;color:#667eea;font-weight:bold;">${dayData.tasks.length}건</div>`:''}
      ${badgeEmojis?`<div style="font-size:10px;">${badgeEmojis}</div>`:''}
    </div>`;
  }

  // 선택된 날 상세
  let detailHtml='';
  if(calSelDate && dayMap[calSelDate]){
    const dd=dayMap[calSelDate];
    const parts=calSelDate.split('-');
    const label=`${parseInt(parts[1])+1}월 ${parts[2]}일`;
    const taskRows=dd.tasks.map(h=>{
      const m=member(h.memberId), c=S.chores.find(x=>x.id===h.choreId);
      if(!m||!c) return '';
      const t=new Date(h.timestamp);
      const ts=`${t.getHours().toString().padStart(2,'0')}:${t.getMinutes().toString().padStart(2,'0')}`;
      return`<div class="activity-item">
        <span style="font-size:16px;">${c.emoji}</span>
        <div style="flex:1;"><b>${m.emoji} ${m.name}</b> · <span style="color:#667eea;">${c.name}</span></div>
        <div style="font-size:10px;color:#aaa;text-align:right;">${ts}<br><span style="background:#ffd93d;color:#333;padding:1px 5px;border-radius:6px;font-size:9px;">+${h.xpEarned}XP</span></div>
      </div>`;
    }).join('');
    const badgeRows=dd.badges.map(b=>{
      const m=member(b.memberId);
      if(!m) return '';
      return`<div class="activity-item">
        <span style="font-size:16px;">${b.emoji}</span>
        <div style="flex:1;"><b>${m.emoji} ${m.name}</b> · <span style="color:#764ba2;">🏅 ${b.name} 뱃지 획득!</span></div>
      </div>`;
    }).join('');
    detailHtml=`<div class="card" style="margin-top:10px;">
      <div class="card-title">📋 ${label} 기록 (${dd.tasks.length}건${dd.badges.length?` · 🏅 뱃지 ${dd.badges.length}개`:''})</div>
      ${badgeRows}${taskRows||'<p class="empty-msg">기록이 없어요.</p>'}
    </div>`;
  }

  el.innerHTML=`
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
        <button class="btn btn-sm" onclick="calNav(-1)" style="background:#eee;color:#333;padding:6px 14px;">◀</button>
        <div style="font-weight:bold;font-size:16px;">${calYear}년 ${MONTH_NAMES[calMonth]}</div>
        <button class="btn btn-sm" onclick="calNav(1)" style="background:#eee;color:#333;padding:6px 14px;">▶</button>
      </div>
      <div class="cal-grid">${cells}</div>
    </div>
    ${detailHtml}
  `;
}

function calNav(dir){
  calMonth+=dir;
  if(calMonth<0){calMonth=11;calYear--;}
  if(calMonth>11){calMonth=0;calYear++;}
  calSelDate=null; renderCalendar();
}

function calSelectDay(key){
  calSelDate=calSelDate===key?null:key;
  renderCalendar();
}

        <button class="btn btn-primary" onclick="saveChoreDetail('${c.id}')" style="margin-top:0;">저장하기 ✅</button>
        <button class="btn btn-sm btn-red" onclick="removeChore('${c.id}')" style="width:100%;margin-top:8px;">이 항목 삭제</button>
      </div>`:`<div style="font-size:13px;color:#aaa;text-align:center;padding:8px;">수정은 관리자만 가능합니다.</div>`}
    </div>
  `;
}

function renderChoreList(){

  S.chores.forEach(c=>{ if(byCategory[c.category]) byCategory[c.category].push(c); else byCategory['house'].push(c); });

  const listHtml = Object.entries(byCategory).map(([cat,chores])=>{
    if(!chores.length) return '';
    return `<div style="margin-bottom:12px;">
      <div style="font-size:12px;font-weight:bold;color:#667eea;margin-bottom:6px;padding:4px 0;border-bottom:1px solid #eee;">${CATEGORIES[cat]}</div>
      ${chores.map(c=>`
        <button class="chore-btn" onclick="openChoreDetail('${c.id}','chore-list')">

            <div style="font-weight:bold;font-size:13px;">${c.name}</div>
            <div style="font-size:11px;color:#888;">피로도 💦${c.fatigue} · +${c.xp}XP</div>
          </div>

  document.getElementById('settingsContent').innerHTML=`
    <button class="back-btn" onclick="goSettingsMain()">← 설정으로 돌아가기</button>
    <div class="card">
      <div class="card-title">🧹 집안일 목록 (${S.chores.length}개)</div>
      ${listHtml||'<p class="empty-msg">항목이 없어요.</p>'}
      ${isAdmin?`<div style="margin-top:8px;border-top:1px solid #eee;padding-top:12px;">
        <div style="font-size:13px;font-weight:bold;color:#444;margin-bottom:8px;">➕ 새 항목 추가</div>
        <div class="emoji-grid" id="choreEmojiPicker">${CHORE_EMOJIS.map(e=>`<button class="emoji-btn${S.selChoreEmoji===e?' sel':''}" onclick="selChoreEmoji('${e}')">${e}</button>`).join('')}</div>
        <input type="text" id="newChoreName" placeholder="이름">
        <select id="newChoreCategory">
          <option value="house">🏠 집안일</option>
          <option value="care">👶 육아</option>
          <option value="pet">🐱 반려동물</option>
        </select>
        <select id="newChoreFatigue">
          <option value="1">피로도 1 — 아주 쉬움</option>
          <option value="2" selected>피로도 2 — 쉬움</option>
          <option value="3">피로도 3 — 보통</option>
          <option value="4">피로도 4 — 힘듦</option>

        <button class="btn btn-primary" onclick="addChoreFromList()" style="margin-top:0;">추가하기</button>
      </div>`:'<div style="font-size:12px;color:#aaa;text-align:center;padding:8px;">항목 추가/수정은 관리자만 가능합니다.</div>'}
    </div>

function weekLabel(ts){
  const d=new Date(ts);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function monthLabel(ts){
  const d=new Date(ts);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}
function fmtDate(ts){ return new Date(ts).toLocaleDateString('ko-KR'); }
function fmtTime(ts){
  const d=new Date(ts);
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function generateMD(startTs, endTs, title){
  const h=S.history.filter(x=>x.timestamp>=startTs&&x.timestamp<endTs);
  const bh=S.badgeHistory.filter(x=>x.timestamp>=startTs&&x.timestamp<endTs);
  const doers=S.members.filter(m=>m.id!=='jerry'&&m.id!=='tori');

  let md=`# 🏠 우리 집 히어로 보고서\n\n`;
  md+=`**${title}**  \n`;
  md+=`**기간:** ${fmtDate(startTs)} ~ ${fmtDate(endTs-1)}\n\n---\n\n`;
  md+=`## 📊 가족 활동 요약\n\n`;
  md+=`| 이름 | 완료 | XP | 피로도 | 뱃지 |\n|------|------|-----|--------|------|\n`;
  doers.forEach(m=>{
    const mh=h.filter(x=>x.memberId===m.id);
    const xp=mh.reduce((s,x)=>s+x.xpEarned,0);
    const fat=mh.reduce((s,x)=>s+x.fatigueAdded,0);
    const badges=bh.filter(x=>x.memberId===m.id).map(x=>x.emoji+x.name).join(' ');
    md+=`| ${m.emoji} ${m.name} | ${mh.length}건 | ${xp} | ${fat} | ${badges||'-'} |\n`;
  });
  md+=`\n## 📋 상세 기록\n\n`;
  const byDate={};
  h.forEach(entry=>{
    const dk=fmtDate(entry.timestamp);
    if(!byDate[dk]) byDate[dk]=[];
    byDate[dk].push(entry);
  });
  Object.entries(byDate).sort().forEach(([date,entries])=>{
    md+=`### ${date}\n\n`;
    entries.forEach(entry=>{
      const m=member(entry.memberId), c=S.chores.find(x=>x.id===entry.choreId);
      if(!m||!c) return;
      md+=`- ${fmtTime(entry.timestamp)} | ${m.emoji} **${m.name}** | ${c.emoji} ${c.name} | +${entry.xpEarned}XP | 💦${entry.fatigueAdded}\n`;
    });
    md+=`\n`;
  });
  if(bh.length){
    md+=`## 🏅 획득 뱃지\n\n`;
    bh.forEach(b=>{
      const m=member(b.memberId); if(!m) return;
      md+=`- ${fmtDate(b.timestamp)} | ${m.emoji} **${m.name}** | ${b.emoji} ${b.name}\n`;
    });
    md+=`\n`;
  }
  md+=`---\n*생성: ${new Date().toLocaleString('ko-KR')}*\n`;
  return md;
}

function generateCSV(startTs, endTs){
  const h=S.history.filter(x=>x.timestamp>=startTs&&x.timestamp<endTs);
  const BOM='﻿';
  const header='날짜,시간,이름,카테고리,항목,피로도,XP';
  const rows=h.map(entry=>{
    const m=member(entry.memberId), c=S.chores.find(x=>x.id===entry.choreId);
    if(!m||!c) return null;
    const catLabel={house:'집안일',care:'육아',pet:'반려동물',child:'자녀'}[c.category]||c.category;
    return [fmtDate(entry.timestamp),fmtTime(entry.timestamp),m.name,catLabel,c.name,c.fatigue,entry.xpEarned].join(',');
  }).filter(Boolean);
  return BOM+header+'\n'+rows.join('\n');
}

function downloadFile(content, filename, mime){
  const blob=new Blob([content],{type:mime});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=filename; a.click();
  URL.revokeObjectURL(url);
}

function downloadReport(type){
  const now=new Date();
  if(type==='week'){
    const ws=weekStart();
    const lbl=weekLabel(ws);
    downloadFile(generateCSV(ws,ws+7*24*60*60*1000),`${lbl}-weekly.csv`,'text/csv;charset=utf-8;');
    downloadFile(generateMD(ws,ws+7*24*60*60*1000,`주간 보고서 ${lbl}`),`${lbl}-weekly.md`,'text/markdown;charset=utf-8;');
  } else {
    const startTs=new Date(now.getFullYear(),now.getMonth(),1).getTime();
    const endTs=new Date(now.getFullYear(),now.getMonth()+1,1).getTime();
    const lbl=monthLabel(startTs);
    downloadFile(generateCSV(startTs,endTs),`${lbl}-monthly.csv`,'text/csv;charset=utf-8;');
    downloadFile(generateMD(startTs,endTs,`월간 보고서 ${lbl}`),`${lbl}-monthly.md`,'text/markdown;charset=utf-8;');
  }
}

//  KAKAO 일일 요약
// ═══════════════════════════════════════
function getDailySummary(){
  const now = new Date();
  const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
  const dateISO = now.toISOString().split('T')[0];

  const tasks = S.history
    .filter(h => h.timestamp >= todayStart)
    .map(h => {
      const m = member(h.memberId);
      const c = S.chores.find(x => x.id === h.choreId);
      return {
        memberName:  m?.name  || '?',
        memberEmoji: m?.emoji || '❓',
        choreName:   c?.name  || '?',
        choreEmoji:  c?.emoji || '❓',
        xp:     h.xpGained   || 0,
        time:   new Date(h.timestamp).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})
      };
    });

  const messages = S.messages
    .filter(msg => msg.timestamp >= todayStart)
    .map(msg => {
      const fromM = member(msg.fromId);
      const toM   = msg.toId ? member(msg.toId) : null;
      return {
        from:      fromM?.name  || msg.fromId,
        fromEmoji: fromM?.emoji || '👤',
        to:        toM?.name    || '전체',
        text:      msg.text,
        time:      new Date(msg.timestamp).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})
      };
    });

  return { date: dateISO, tasks, messages };
}

function downloadDailySummary(){
  const summary = getDailySummary();
  downloadFile(JSON.stringify(summary, null, 2), 'daily_summary.json', 'application/json;charset=utf-8;');
  alert('✅ 저장 완료!\n\n이제 ForHouse 폴더의\n📂 카카오발송.bat 을 더블클릭하면\n카카오톡으로 발송됩니다 📨');
}
